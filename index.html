<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JUNO FLOW</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
  #game { display: block; width: 100vw; height: 100vh; background: #000; }

  /* HUD */
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 2;
    color: #fff; text-shadow: 1px 1px 3px #000;
    font-size: 13px; letter-spacing: 1px;
    pointer-events: none;
  }
  #hudName { color: #ffd24a; font-weight: 700; margin-bottom: 2px; }
  #hpBar {
    width: 220px; height: 16px; background: #222;
    border: 2px solid #fff; border-radius: 3px;
    overflow: hidden; margin-top: 4px;
  }
  #hpFill {
    height: 100%; width: 100%;
    background: linear-gradient(to right, #e04a4a, #ff8a8a);
    transition: width 0.2s;
  }
  #stageInfo { margin-top: 10px; color: #ffd24a; }
  #killCount { font-size: 12px; color: #bbb; margin-top: 4px; }
  #hudScore { font-size: 12px; color: #bbb; margin-top: 4px; }

  /* Proximity tint */
  #tint {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(circle at center, rgba(120,0,0,0) 0%, rgba(80,0,0,0) 100%);
    transition: background 0.3s;
  }

  /* Upload panel */
  #uploadPanel {
    position: fixed; top: 12px; right: 12px; z-index: 2;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 10px 14px; border-radius: 6px; font-size: 12px;
    border: 1px dashed #888;
  }
  #uploadPanel input { display: none; }
  #uploadPanel label { cursor: pointer; color: #ffd24a; }
  #uploadPanel.ok { border-color: #ffd24a; }

  /* Overlay for start / game over / stage clear */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: #fff; z-index: 10; padding: 30px; text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 56px; color: #ffd24a; margin-bottom: 6px;
    letter-spacing: 6px; text-shadow: 3px 3px 0 #5a3a00;
  }
  #overlay .sub { color: #888; letter-spacing: 4px; margin-bottom: 24px; font-size: 13px; }
  #overlay p { color: #bbb; margin: 6px 0; max-width: 500px; line-height: 1.7; }
  #overlay button {
    padding: 14px 38px; font-size: 14px; letter-spacing: 4px;
    background: #1a1a1a; color: #ffd24a; border: 2px solid #ffd24a;
    border-radius: 4px; cursor: pointer; margin-top: 24px;
    transition: all 0.2s; font-family: inherit;
  }
  #overlay button:hover:not([disabled]) { background: #ffd24a; color: #111; }
  #overlay button[disabled] { opacity: 0.3; cursor: not-allowed; }

  kbd {
    background: #333; border: 1px solid #555;
    padding: 2px 6px; border-radius: 3px;
    font-family: monospace; color: #ffd24a;
  }
  .controls {
    display: grid; grid-template-columns: auto auto;
    gap: 6px 18px; margin-top: 18px; font-size: 12px;
    color: #999;
  }
  .controls .k { text-align: right; }
  .controls .v { text-align: left; }

  /* Drop area in start screen */
  #startDrop {
    margin-top: 14px; padding: 16px 28px;
    border: 2px dashed #555; border-radius: 6px;
    color: #999; font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  #startDrop.ok, #startDrop:hover { border-color: #ffd24a; color: #ffd24a; background: rgba(255,210,74,0.04); }
  #startDrop input { display: none; }
  #previewWrap { margin-top: 10px; display: none; }
  #previewWrap.show { display: block; }
  #previewWrap img { max-width: 80px; max-height: 80px; border: 2px solid #ffd24a; border-radius: 4px; }

  /* Flash overlay for damage */
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    background: #fff; opacity: 0; transition: opacity 0.1s;
  }

  /* Name input */
  #nameRow {
    margin-top: 14px; display: flex; align-items: center;
    gap: 10px; color: #bbb; font-size: 13px;
  }
  #nameInput {
    background: #1a1a1a; color: #ffd24a; border: 1px solid #555;
    border-radius: 4px; padding: 8px 12px; font-size: 14px;
    font-family: inherit; letter-spacing: 1px; width: 200px;
    text-align: center;
  }
  #nameInput:focus { outline: none; border-color: #ffd24a; }

  /* Leaderboard (현재 이 파일에서는 점수 전송만, 표시는 별도 랭킹 페이지에서) */
  #leaderboard {
    margin-top: 18px; background: rgba(20,20,20,0.85);
    border: 1px solid #333; border-radius: 6px;
    padding: 14px 18px; min-width: 360px; max-width: 420px;
  }
  #leaderboard h3 {
    color: #ffd24a; font-size: 13px; letter-spacing: 4px;
    margin-bottom: 10px; text-align: center;
  }
  #leaderboard table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    color: #ccc;
  }
  #leaderboard th {
    color: #888; font-weight: 500; text-align: left;
    padding: 4px 6px; border-bottom: 1px solid #333;
    letter-spacing: 1px;
  }
  #leaderboard td {
    padding: 4px 6px; border-bottom: 1px solid #222;
  }
  #leaderboard tr.you td { color: #ffd24a; background: rgba(255,210,74,0.05); }
  #leaderboard tr.top1 td .rank { color: #ffd24a; font-weight: 700; }
  #leaderboard tr.top2 td .rank { color: #d0d0d0; }
  #leaderboard tr.top3 td .rank { color: #c09060; }
  #leaderboard .empty { color: #555; text-align: center; padding: 16px; font-style: italic; }
  #leaderboard .right { text-align: right; }

  #rankPopup {
    margin-top: 10px; color: #ffd24a; font-size: 14px; letter-spacing: 2px;
  }

  /* 모바일 터치 컨트롤 */
  #touchControls {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 10px 12px 14px;
    display: none; /* 모바일에서만 보이도록 아래 미디어쿼리에서 켭니다 */
    justify-content: space-between;
    align-items: flex-end;
    z-index: 5;
    pointer-events: none;
  }
  #touchControls .touch-left,
  #touchControls .touch-right {
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }
  .touch-btn {
    min-width: 56px;
    min-height: 56px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    touch-action: none;
  }
  .touch-btn:active {
    background: rgba(255, 210, 74, 0.9);
    color: #111;
  }

  @media (max-width: 768px) {
    /* 모바일에서 터치 컨트롤 노출 및 오버레이 여백 축소 */
    #touchControls {
      display: flex;
    }
    #overlay {
      padding: 16px;
    }
    #overlay h1 {
      font-size: 40px;
      letter-spacing: 4px;
    }
    #overlay .sub {
      letter-spacing: 2px;
    }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="tint"></div>
<div id="flash"></div>

<div id="hud" style="display:none">
  <div id="hudName">PLAYER: -</div>
  <div>HP</div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="stageInfo">STAGE 1</div>
  <div id="killCount">Kills: 0 / 5</div>
  <div id="hudScore">SCORE: 0</div>
  <div style="margin-top:10px; font-size:11px; color:#999">
    <kbd>←</kbd> <kbd>→</kbd> · <kbd>Space</kbd> 점프 · <kbd>Z</kbd> 공격
  </div>
</div>

<div id="uploadPanel" style="display:none">
  <div>몬스터 이미지</div>
  <label for="monsterFile">클릭해서 변경</label>
  <input type="file" id="monsterFile" accept="image/*">
</div>

<!-- 모바일 터치 컨트롤 -->
<div id="touchControls">
  <div class="touch-left">
    <button class="touch-btn" data-action="left">◀</button>
    <button class="touch-btn" data-action="right">▶</button>
  </div>
  <div class="touch-right">
    <button class="touch-btn" data-action="jump">JUMP</button>
    <button class="touch-btn" data-action="attack">ATK</button>
  </div>
</div>

<!-- Start / Game-over / Victory overlay -->
<div id="overlay">
  <h1 id="overlayTitle">JUNO FLOW</h1>
  <div class="sub" id="overlaySub">A CREEPY PLATFORMER</div>
  <p id="overlayBody">
    모든 몬스터를 처치하고 다음 스테이지로 진행하세요.<br>
    너무 오래 바라보면 그것은 더 빨라집니다.
  </p>
  <div class="controls" id="overlayControls">
    <div class="k"><kbd>←</kbd> <kbd>→</kbd></div><div class="v">이동</div>
    <div class="k"><kbd>Space</kbd></div><div class="v">점프 (꾹 누르면 높이 점프)</div>
    <div class="k"><kbd>Z</kbd></div><div class="v">공격</div>
  </div>

  <label id="startDrop">
    <div style="color:#ffd24a; font-weight:700">(선택) 나만의 몬스터 이미지 사용</div>
    <div>클릭 / 드래그 / Ctrl+V 붙여넣기 — 안 올리면 기본 몬스터로 진행</div>
    <input type="file" id="startFile" accept="image/*">
  </label>
  <div id="previewWrap"><img id="preview" alt="preview"></div>

  <!-- 닉네임 입력 -->
  <div id="nameRow">
    <span>닉네임</span>
    <input id="nameInput" type="text" maxlength="16" placeholder="예: shadow-juno" />
  </div>

  <button id="actionBtn" disabled>모 험 시 작</button>
</div>

<script>
/* =============================================================
   CREEPY PLATFORMER + RANK SUBMIT
   ============================================================= */

// -------------------------------------------------------------
// Canvas
// -------------------------------------------------------------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize); resize();

// -------------------------------------------------------------
// Config
// -------------------------------------------------------------
const Config = {
  gravity: 0.6,
  moveSpeed: 5.2,
  jumpInitial: 9,
  jumpHoldBoost: 0.55,
  jumpMaxHoldTime: 0.28,
  coyoteTime: 0.1,
  jumpBufferTime: 0.12,
  playerMaxHP: 100,
  attackDuration: 0.18,
  attackCooldown: 0.28,
  attackReach: 70,
  attackDamage: 25,
  enemyContactDamage: 10,
  enemyContactCooldown: 0.9,
  worldWidth: 3600,
  tileSize: 32,
};

// 랭킹 서버 설정
const STORAGE_USER_KEY = 'junoFlowUsername';
// Next.js 랭킹 서버가 다른 도메인에 있다면 여기 채워주세요. 예: 'https://juno-flow-ranking.vercel.app'
const RANK_API_BASE = '';

function apiUrl(path) {
  if (!RANK_API_BASE) return path;
  return RANK_API_BASE.replace(/\/$/, '') + path;
}

// -------------------------------------------------------------
// Input — with edge detect + jump buffer
// -------------------------------------------------------------
const Input = {
  held: {},
  pressed: {},
  jumpBuffer: 0,
  init() {
    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if ([' ','arrowleft','arrowright','arrowup','arrowdown','z'].includes(k)) e.preventDefault();
      if (!this.held[k]) this.pressed[k] = true;
      if (k === ' ' && !this.held[k]) this.jumpBuffer = Config.jumpBufferTime;
      this.held[k] = true;
    });
    window.addEventListener('keyup', e => { this.held[e.key.toLowerCase()] = false; });
  },
  update(dt) { if (this.jumpBuffer > 0) this.jumpBuffer -= dt; },
  down(k)     { return !!this.held[k.toLowerCase()]; },
  tap(k)      { const v = this.pressed[k.toLowerCase()]; this.pressed[k.toLowerCase()] = false; return !!v; },
  consumeJump() { if (this.jumpBuffer > 0) { this.jumpBuffer = 0; return true; } return false; }
};
Input.init();

// -------------------------------------------------------------
// Touch controls → 키보드 입력으로 매핑 (모바일)
// -------------------------------------------------------------
(function setupTouchControls() {
  const el = document.getElementById('touchControls');
  if (!el) return;

  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (!isTouchDevice) return;

  function touchKeyDown(key) {
    const k = key.toLowerCase();
    if (!Input.held[k]) Input.pressed[k] = true;
    if (k === ' ') Input.jumpBuffer = Config.jumpBufferTime;
    Input.held[k] = true;
  }
  function touchKeyUp(key) {
    const k = key.toLowerCase();
    Input.held[k] = false;
  }

  el.querySelectorAll('[data-action]').forEach(btn => {
    const action = btn.getAttribute('data-action');
    let key;
    if (action === 'left') key = 'ArrowLeft';
    else if (action === 'right') key = 'ArrowRight';
    else if (action === 'jump') key = ' ';
    else if (action === 'attack') key = 'z';
    if (!key) return;

    const onDown = ev => {
      ev.preventDefault();
      touchKeyDown(key);
    };
    const onUp = ev => {
      ev.preventDefault();
      touchKeyUp(key);
    };

    btn.addEventListener('touchstart', onDown, { passive: false });
    btn.addEventListener('touchend', onUp, { passive: false });
    btn.addEventListener('touchcancel', onUp, { passive: false });
  });
})();

// -------------------------------------------------------------
// Audio — music loop + sfx (Web Audio synthesized)
// -------------------------------------------------------------
const Audio = {
  ctx: null,
  musicStarted: false,
  _music: null,
  _ctx() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); return this.ctx; },

  sfx(freq, dur, type = 'square', vol = 0.1) {
    const c = this._ctx(); const now = c.currentTime;
    const o = c.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(c.destination);
    o.start(now); o.stop(now + dur + 0.02);
  },
  jump()   { this.sfx(560, 0.08, 'square', 0.06); this.sfx(720, 0.08, 'square', 0.05); },
  attack() { this.sfx(220, 0.07, 'sawtooth', 0.08); },
  hit()    { this.sfx(900, 0.05, 'square', 0.12); this.sfx(300, 0.09, 'square', 0.08); },
  hurt()   { this.sfx(140, 0.2, 'sawtooth', 0.18); },
  die()    {
    this.sfx(200, 0.14, 'sawtooth', 0.15);
    setTimeout(() => this.sfx(120, 0.2, 'sawtooth', 0.12), 80);
    setTimeout(() => this.sfx(80, 0.35, 'sawtooth', 0.1), 160);
  },
  stare()  { this.sfx(1100, 0.05, 'sine', 0.06); },

  startMusic() {
    if (this.musicStarted) return;
    this.musicStarted = true;
    const c = this._ctx();
    const drone = c.createOscillator(); drone.type = 'sawtooth'; drone.frequency.value = 55;
    const df = c.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 180;
    const dg = c.createGain(); dg.gain.value = 0.04;
    drone.connect(df); df.connect(dg); dg.connect(c.destination);
    drone.start();

    const bs = 2 * c.sampleRate;
    const nb = c.createBuffer(1, bs, c.sampleRate);
    const d = nb.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
    const ns = c.createBufferSource(); ns.buffer = nb; ns.loop = true;
    const nf = c.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 400; nf.Q.value = 0.8;
    const ng = c.createGain(); ng.gain.value = 0.03;
    ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
    ns.start();

    const eerieNotes = [220, 165, 277, 185, 146];
    let i = 0;
    const eerieLoop = () => {
      if (!this.musicStarted) return;
      const n = eerieNotes[i % eerieNotes.length]; i++;
      const now = c.currentTime;
      const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = n;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.04, now + 0.5);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(now); o.stop(now + 3.3);
      setTimeout(eerieLoop, 4500 + Math.random() * 3000);
    };
    setTimeout(eerieLoop, 2000);
  }
};

// -------------------------------------------------------------
// Camera — with shake
// -------------------------------------------------------------
const Camera = {
  x: 0, y: 0, shake: 0,
  update() {
    const target = Player.x + Player.w / 2 - W / 2;
    this.x += (target - this.x) * 0.14;
    this.x = Math.max(0, Math.min(Config.worldWidth - W, this.x));
    this.shake *= 0.82;
  },
  shakeNow(amt) { this.shake = Math.max(this.shake, amt); },
  offsetX() { return (Math.random() - 0.5) * this.shake; },
  offsetY() { return (Math.random() - 0.5) * this.shake; }
};

// -------------------------------------------------------------
// Effects — flash overlay, particles, damage numbers
// -------------------------------------------------------------
const Effects = {
  particles: [],
  dmgNums: [],

  hitFlash(intensity = 0.4) {
    const el = document.getElementById('flash');
    el.style.opacity = intensity;
    setTimeout(() => { el.style.opacity = '0'; }, 80);
  },
  spawnBurst(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 6,
        vy: -2 - Math.random() * 4,
        life: 1,
        color
      });
    }
  },
  spawnDamageNum(x, y, text, crit = false) {
    this.dmgNums.push({ x, y, text, crit, life: 1 });
  },
  update(dt) {
    for (const p of this.particles) {
      p.vy += 0.35; p.x += p.vx; p.y += p.vy; p.life -= dt * 1.5;
    }
    this.particles = this.particles.filter(p => p.life > 0);
    for (const d of this.dmgNums) { d.y -= 40 * dt; d.life -= dt * 1.3; }
    this.dmgNums = this.dmgNums.filter(d => d.life > 0);
  },
  draw() {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - Camera.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
    for (const d of this.dmgNums) {
      ctx.globalAlpha = d.life;
      ctx.font = `bold ${d.crit ? 22 : 16}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
      ctx.strokeText(d.text, d.x - Camera.x, d.y);
      ctx.fillStyle = d.crit ? '#ffe64a' : '#fff';
      ctx.fillText(d.text, d.x - Camera.x, d.y);
    }
    ctx.globalAlpha = 1;
  }
};

// -------------------------------------------------------------
// Level — multi-height platforms
// -------------------------------------------------------------
const Level = {
  groundY: 540,
  platforms: [
    { x: 0,    y: 540, w: 800,  h: 80 },
    { x: 900,  y: 540, w: 500,  h: 80 },
    { x: 1500, y: 540, w: 600,  h: 80 },
    { x: 2200, y: 540, w: 1400, h: 80 },
    { x: 250,  y: 420, w: 160, h: 14 },
    { x: 500,  y: 330, w: 160, h: 14 },
    { x: 750,  y: 240, w: 160, h: 14 },
    { x: 1000, y: 400, w: 160, h: 14 },
    { x: 1250, y: 320, w: 180, h: 14 },
    { x: 1600, y: 440, w: 180, h: 14 },
    { x: 1850, y: 360, w: 180, h: 14 },
    { x: 2100, y: 280, w: 180, h: 14 },
    { x: 2400, y: 380, w: 180, h: 14 },
    { x: 2650, y: 300, w: 180, h: 14 },
    { x: 2950, y: 420, w: 180, h: 14 },
    { x: 3200, y: 340, w: 180, h: 14 },
  ]
};

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// -------------------------------------------------------------
// Player
// -------------------------------------------------------------
const Player = {
  x: 80, y: 400, w: 32, h: 48,
  vx: 0, vy: 0,
  facing: 1,
  onGround: false,
  coyote: 0,
  jumpHold: 0,
  hp: Config.playerMaxHP,
  maxHp: Config.playerMaxHP,
  invuln: 0,
  attackTimer: 0,
  attackCooldown: 0,
  animT: 0,
  hitFlash: 0,

  reset() {
    this.x = 80; this.y = 400;
    this.vx = 0; this.vy = 0;
    this.hp = this.maxHp;
    this.invuln = 0;
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.coyote = 0; this.jumpHold = 0;
  },

  update(dt) {
    this.animT += dt;
    if (this.invuln > 0) this.invuln -= dt;
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.attackTimer > 0) this.attackTimer -= dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;

    this.vx = 0;
    if (Input.down('arrowleft'))  { this.vx = -Config.moveSpeed; this.facing = -1; }
    if (Input.down('arrowright')) { this.vx = +Config.moveSpeed; this.facing = +1; }

    if (this.onGround) this.coyote = Config.coyoteTime;
    else this.coyote -= dt;

    if (Input.consumeJump() && this.coyote > 0) {
      this.vy = -Config.jumpInitial;
      this.jumpHold = Config.jumpMaxHoldTime;
      this.onGround = false;
      this.coyote = 0;
      Audio.jump();
    }
    if (Input.down(' ') && this.jumpHold > 0 && this.vy < 0) {
      this.vy -= Config.jumpHoldBoost;
      this.jumpHold -= dt;
    } else {
      this.jumpHold = 0;
    }

    if (Input.tap('z') && this.attackCooldown <= 0) {
      this.attackTimer = Config.attackDuration;
      this.attackCooldown = Config.attackCooldown;
      Audio.attack();
      Combat.performAttack();
    }

    this.vy += Config.gravity;
    if (this.vy > 17) this.vy = 17;

    this.x += this.vx;
    this.x = Math.max(0, Math.min(Config.worldWidth - this.w, this.x));

    this.y += this.vy;
    this.onGround = false;
    for (const p of Level.platforms) {
      if (this.vy >= 0 &&
          this.x + this.w > p.x && this.x < p.x + p.w &&
          this.y + this.h >= p.y && this.y + this.h <= p.y + Math.max(20, p.h)) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.onGround = true;
      }
    }

    if (this.y > H + 100) this.hit(30);
  },

  hit(dmg, fromX) {
    if (this.invuln > 0) return;
    this.hp = Math.max(0, this.hp - dmg);
    this.invuln = Config.enemyContactCooldown;
    this.hitFlash = 0.25;
    if (fromX !== undefined) this.vx = this.x < fromX ? -7 : 7;
    this.vy = -6;
    Audio.hurt();
    Effects.hitFlash(0.45);
    Camera.shakeNow(10);
    Effects.spawnDamageNum(this.x + this.w / 2, this.y - 10, dmg);
    if (this.hp <= 0) Game.gameOver();
  },

  attackBox() {
    const ax = this.facing > 0 ? this.x + this.w : this.x - Config.attackReach;
    return { x: ax, y: this.y + 6, w: Config.attackReach, h: this.h - 12 };
  },

  draw() {
    const sx = this.x - Camera.x + Camera.offsetX();
    const sy = this.y + Camera.offsetY();
    if (this.invuln > 0 && Math.floor(this.invuln * 20) % 2 === 0) return;
    if (this.hitFlash > 0) ctx.filter = 'brightness(2.5)';

    ctx.fillStyle = '#2a3a5a';
    const walking = Math.abs(this.vx) > 0.1 && this.onGround;
    const swing = walking ? Math.sin(this.animT * 16) * 3 : 0;
    ctx.fillRect(sx + 6, sy + 30, 8, 18 - swing);
    ctx.fillRect(sx + 18, sy + 30, 8, 18 + swing);
    ctx.fillStyle = '#4288dd';
    ctx.fillRect(sx + 4, sy + 14, 24, 20);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(sx + 4, sy + 30, 24, 3);
    ctx.fillStyle = '#f2c69a';
    ctx.fillRect(sx + 6, sy, 20, 16);
    ctx.fillStyle = '#3a2412';
    ctx.fillRect(sx + 4, sy, 24, 6);
    ctx.fillStyle = '#000';
    const ex = this.facing > 0 ? sx + 18 : sx + 8;
    ctx.fillRect(ex, sy + 8, 3, 3);

    if (this.attackTimer > 0) {
      const box = this.attackBox();
      ctx.fillStyle = 'rgba(255,220,120,0.5)';
      ctx.fillRect(box.x - Camera.x, box.y, box.w, box.h);
      ctx.fillStyle = '#e0e4ee';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 18, 46, 6);
      else ctx.fillRect(sx - 46, sy + 18, 46, 6);
      ctx.fillStyle = '#8e9ab0';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 20, 46, 2);
      else ctx.fillRect(sx - 46, sy + 20, 46, 2);
    } else {
      ctx.fillStyle = '#f2c69a';
      if (this.facing > 0) ctx.fillRect(sx + 24, sy + 18, 5, 12);
      else ctx.fillRect(sx + 3, sy + 18, 5, 12);
    }

    ctx.filter = 'none';
  }
};
