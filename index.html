<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>JUNO FLOW</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
  #game {
    display: block; background: #000;
    width: 100vw; height: 100vh;
    width: 100dvw; height: 100dvh;
  }

  /* HUD */
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 2;
    color: #fff; text-shadow: 1px 1px 3px #000;
    font-size: 13px; letter-spacing: 1px;
    pointer-events: none;
  }
  #hpBar {
    width: 220px; height: 16px; background: #222;
    border: 2px solid #fff; border-radius: 3px;
    overflow: hidden; margin-top: 4px;
  }
  #hpFill {
    height: 100%; width: 100%;
    background: linear-gradient(to right, #e04a4a, #ff8a8a);
    transition: width 0.2s;
  }
  #stageInfo { margin-top: 10px; color: #ffd24a; }
  #killCount { font-size: 12px; color: #bbb; margin-top: 4px; }

  /* Proximity tint */
  #tint {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(circle at center, rgba(120,0,0,0) 0%, rgba(80,0,0,0) 100%);
    transition: background 0.3s;
  }

  /* Upload panel */
  #uploadPanel {
    position: fixed; top: 12px; right: 12px; z-index: 2;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 10px 14px; border-radius: 6px; font-size: 12px;
    border: 1px dashed #888;
  }
  #uploadPanel input { display: none; }
  #uploadPanel label { cursor: pointer; color: #ffd24a; }
  #uploadPanel.ok { border-color: #ffd24a; }

  /* Overlay for start / game over / stage clear */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: #fff; z-index: 10; padding: 30px; text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 56px; color: #ffd24a; margin-bottom: 6px;
    letter-spacing: 6px; text-shadow: 3px 3px 0 #5a3a00;
  }
  #overlay .sub { color: #888; letter-spacing: 4px; margin-bottom: 24px; font-size: 13px; }
  #overlay p { color: #bbb; margin: 6px 0; max-width: 500px; line-height: 1.7; }
  #overlay button {
    padding: 14px 38px; font-size: 14px; letter-spacing: 4px;
    background: #1a1a1a; color: #ffd24a; border: 2px solid #ffd24a;
    border-radius: 4px; cursor: pointer; margin-top: 24px;
    transition: all 0.2s; font-family: inherit;
  }
  #overlay button:hover:not([disabled]) { background: #ffd24a; color: #111; }
  #overlay button[disabled] { opacity: 0.3; cursor: not-allowed; }

  kbd {
    background: #333; border: 1px solid #555;
    padding: 2px 6px; border-radius: 3px;
    font-family: monospace; color: #ffd24a;
  }
  .controls {
    display: grid; grid-template-columns: auto auto;
    gap: 6px 18px; margin-top: 18px; font-size: 12px;
    color: #999;
  }
  .controls .k { text-align: right; }
  .controls .v { text-align: left; }

  /* Drop area in start screen */
  #startDrop {
    margin-top: 14px; padding: 16px 28px;
    border: 2px dashed #555; border-radius: 6px;
    color: #999; font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  #startDrop.ok, #startDrop:hover { border-color: #ffd24a; color: #ffd24a; background: rgba(255,210,74,0.04); }
  #startDrop input { display: none; }
  #previewWrap { margin-top: 10px; display: none; }
  #previewWrap.show { display: block; }
  #previewWrap img { max-width: 80px; max-height: 80px; border: 2px solid #ffd24a; border-radius: 4px; }

  /* Flash overlay for damage */
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    background: #fff; opacity: 0; transition: opacity 0.1s;
  }

  /* Name input */
  #nameRow {
    margin-top: 14px; display: flex; align-items: center;
    gap: 10px; color: #bbb; font-size: 13px;
  }
  #nameInput {
    background: #1a1a1a; color: #ffd24a; border: 1px solid #555;
    border-radius: 4px; padding: 8px 12px; font-size: 14px;
    font-family: inherit; letter-spacing: 1px; width: 200px;
    text-align: center;
  }
  #nameInput:focus { outline: none; border-color: #ffd24a; }
  #currentName { color: #ffd24a; font-weight: 700; }
  #changeNameBtn {
    background: none; border: none; color: #888; cursor: pointer;
    font-size: 11px; text-decoration: underline;
  }

  /* HUD name display */
  #hudName { color: #ffd24a; font-weight: 700; margin-bottom: 2px; }
  #hudScore { font-size: 12px; color: #bbb; margin-top: 4px; }

  /* Leaderboard */
  #leaderboard {
    margin-top: 18px; background: rgba(20,20,20,0.85);
    border: 1px solid #333; border-radius: 6px;
    padding: 14px 18px; min-width: 360px; max-width: 420px;
  }
  #leaderboard h3 {
    color: #ffd24a; font-size: 13px; letter-spacing: 4px;
    margin-bottom: 10px; text-align: center;
  }
  #leaderboard table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    color: #ccc;
  }
  #leaderboard th {
    color: #888; font-weight: 500; text-align: left;
    padding: 4px 6px; border-bottom: 1px solid #333;
    letter-spacing: 1px;
  }
  #leaderboard td {
    padding: 4px 6px; border-bottom: 1px solid #222;
  }
  #leaderboard tr.you td { color: #ffd24a; background: rgba(255,210,74,0.05); }
  #leaderboard tr.top1 td .rank { color: #ffd24a; font-weight: 700; }
  #leaderboard tr.top2 td .rank { color: #d0d0d0; }
  #leaderboard tr.top3 td .rank { color: #c09060; }
  #leaderboard .empty { color: #555; text-align: center; padding: 16px; font-style: italic; }
  #leaderboard .right { text-align: right; }

  #rankPopup {
    margin-top: 10px; color: #ffd24a; font-size: 14px; letter-spacing: 2px;
  }
  #syncStatus { font-size: 10px; letter-spacing: 1px; margin-left: 6px; }
  #syncStatus.syncing { color: #6ab0ff; }
  #syncStatus.ok      { color: #5dd48a; }
  #syncStatus.fail    { color: #ff8a8a; }

  /* ============ Mobile touch controls ============ */
  #touchControls {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    display: none;
  }
  #touchControls.on { display: block; }
  .touch-group {
    position: fixed; bottom: max(18px, env(safe-area-inset-bottom));
    display: flex; gap: 14px; pointer-events: auto;
  }
  .touch-group.left { left: max(18px, env(safe-area-inset-left)); }
  .touch-group.right {
    right: max(18px, env(safe-area-inset-right));
    flex-direction: column-reverse;
    align-items: center;
  }
  .touch-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255, 210, 74, 0.18);
    border: 2px solid rgba(255, 210, 74, 0.6);
    color: #ffd24a;
    font-size: 26px; font-weight: 700;
    font-family: inherit;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.08s, background 0.08s;
    backdrop-filter: blur(3px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }
  .touch-btn.active {
    transform: scale(0.92);
    background: rgba(255, 210, 74, 0.55);
  }
  .touch-btn.action { width: 82px; height: 82px; }
  .touch-btn.jump {
    background: rgba(74, 180, 255, 0.22);
    border-color: rgba(140, 210, 255, 0.7);
    color: #9fd8ff;
  }
  .touch-btn.jump.active { background: rgba(74, 180, 255, 0.6); }
  .touch-btn.attack {
    background: rgba(255, 90, 90, 0.22);
    border-color: rgba(255, 130, 130, 0.7);
    color: #ff9a9a;
  }
  .touch-btn.attack.active { background: rgba(255, 90, 90, 0.6); }

  /* Responsive overlay/HUD for mobile */
  @media (max-width: 820px), (pointer: coarse) {
    #hud { font-size: 11px; top: 8px; left: 8px; }
    #hpBar { width: 150px; height: 12px; }
    #stageInfo { margin-top: 6px; }
    #uploadPanel {
      top: 8px; right: 8px;
      font-size: 10px; padding: 6px 8px;
    }
    #overlay { padding: 16px; }
    #overlay h1 { font-size: 36px; letter-spacing: 4px; }
    #overlay .sub { font-size: 11px; letter-spacing: 3px; margin-bottom: 16px; }
    #overlay p { font-size: 13px; line-height: 1.55; }
    #overlay button {
      padding: 18px 36px; font-size: 14px; letter-spacing: 3px;
      margin-top: 18px;
    }
    #startDrop { padding: 12px 18px; font-size: 11px; }
    .controls { font-size: 11px; gap: 4px 12px; }
    #nameInput { width: 160px; font-size: 13px; }
    #leaderboard { min-width: unset; width: 100%; max-width: 360px; padding: 10px 12px; }
    #leaderboard th, #leaderboard td { padding: 3px 4px; font-size: 11px; }
  }
  @media (max-height: 480px) and (orientation: landscape) {
    #overlay h1 { font-size: 28px; margin-bottom: 2px; }
    #overlay .sub { margin-bottom: 8px; }
    #overlay p { font-size: 12px; margin: 2px 0; }
    #overlay button { padding: 10px 24px; margin-top: 8px; }
    .controls { margin-top: 6px; }
    #startDrop { margin-top: 6px; padding: 6px 12px; }
  }

  /* iOS fixes — don't put touch-action:none on html/body (breaks button taps in iOS Safari) */
  html, body {
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    /* Use dynamic viewport units so URL bar hide/show doesn't clip us */
    height: 100dvh; min-height: 100dvh;
  }
  #game { touch-action: none; -webkit-touch-callout: none; }
  #overlay, #overlay button, #actionBtn { touch-action: manipulation; }
  #nameInput { -webkit-user-select: text; user-select: text; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="tint"></div>
<div id="flash"></div>

<div id="hud" style="display:none">
  <div id="hudName">Player</div>
  <div>HP</div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="stageInfo">STAGE 1</div>
  <div id="killCount">Kills: 0 / 5</div>
  <div id="hudScore">Score: 0</div>
  <div style="margin-top:10px; font-size:11px; color:#999">
    <kbd>←</kbd> <kbd>→</kbd> · <kbd>Space</kbd> 점프 · <kbd>Z</kbd> 공격
  </div>
</div>

<div id="uploadPanel" style="display:none">
  <div>몬스터 이미지</div>
  <label for="monsterFile">클릭해서 변경</label>
  <input type="file" id="monsterFile" accept="image/*">
</div>

<!-- Start / Game-over / Victory overlay -->
<div id="overlay">
  <h1 id="overlayTitle">JUNO FLOW</h1>
  <div class="sub" id="overlaySub">A CREEPY PLATFORMER</div>
  <p id="overlayBody">
    모든 몬스터를 처치하고 다음 스테이지로 진행하세요.<br>
    너무 오래 바라보면 그것은 더 빨라집니다.
  </p>
  <div class="controls" id="overlayControls">
    <div class="k"><kbd>←</kbd> <kbd>→</kbd></div><div class="v">이동</div>
    <div class="k"><kbd>Space</kbd></div><div class="v">점프 (꾹 누르면 높이 점프)</div>
    <div class="k"><kbd>Z</kbd></div><div class="v">공격</div>
  </div>

  <div id="nameRow">
    <span>닉네임</span>
    <input id="nameInput" type="text" maxlength="16" placeholder="예: shadow-juno" autocomplete="off" spellcheck="false" inputmode="text" enterkeyhint="go" autocapitalize="off">
  </div>

  <label id="startDrop">
    <div style="color:#ffd24a; font-weight:700">(선택) 나만의 몬스터 이미지 사용</div>
    <div>클릭 / 드래그 / Ctrl+V 붙여넣기 — 안 올리면 기본 몬스터로 진행</div>
    <input type="file" id="startFile" accept="image/*">
  </label>
  <div id="previewWrap"><img id="preview" alt="preview"></div>

  <button id="actionBtn">모 험 시 작</button>

  <div id="rankPopup"></div>

  <div id="leaderboard">
    <h3>RANKING TOP 10 <span id="syncStatus"></span></h3>
    <table>
      <thead>
        <tr><th style="width:32px">#</th><th>이름</th><th class="right">점수</th><th class="right" style="width:56px">스테이지</th></tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>
</div>

<!-- Mobile touch controls -->
<div id="touchControls" aria-hidden="true">
  <div class="touch-group left">
    <button class="touch-btn dpad" data-action="left" aria-label="왼쪽">◀</button>
    <button class="touch-btn dpad" data-action="right" aria-label="오른쪽">▶</button>
  </div>
  <div class="touch-group right">
    <button class="touch-btn action jump" data-action="jump" aria-label="점프">▲</button>
    <button class="touch-btn action attack" data-action="attack" aria-label="공격">Z</button>
  </div>
</div>

<script>
/* =============================================================
   CREEPY PLATFORMER
   Modules (in order defined below):
     Config    : tunable numbers
     Input     : keyboard
     Audio     : music + sfx via Web Audio
     Camera    : follow + shake
     Effects   : flash / shake / particles / damage nums
     Level     : platforms
     Player    : physics, jump (variable + coyote + buffer), attack
     Enemy     : AI (patrol / chase / stare / aggression), death
     Combat    : attack vs enemy hitbox
     Stage     : enemy spawning, clear conditions, progression
     Renderer  : draws everything in order
     Game      : overall state machine, loop, UI screens
   ============================================================= */

// -------------------------------------------------------------
// Canvas
// -------------------------------------------------------------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  // visualViewport gives accurate size on mobile (accounts for URL bar)
  const vw = (window.visualViewport && window.visualViewport.width)  || window.innerWidth;
  const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  W = Math.floor(vw); H = Math.floor(vh);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// -------------------------------------------------------------
// Config
// -------------------------------------------------------------
const Config = {
  gravity: 0.6,
  moveSpeed: 5.2,
  jumpInitial: 9,        // initial upward velocity
  jumpHoldBoost: 0.55,   // extra upward accel while Space held
  jumpMaxHoldTime: 0.28, // seconds
  coyoteTime: 0.1,       // grace after walking off
  jumpBufferTime: 0.12,  // pre-input window
  playerMaxHP: 100,
  attackDuration: 0.18,
  attackCooldown: 0.28,
  attackReach: 70,
  attackDamage: 25,
  enemyContactDamage: 10,
  enemyContactCooldown: 0.9,
  worldWidth: 3600,
  tileSize: 32,
};

// -------------------------------------------------------------
// Input — with edge detect + jump buffer
// -------------------------------------------------------------
const Input = {
  held: {},
  pressed: {},
  jumpBuffer: 0,
  init() {
    window.addEventListener('keydown', e => {
      // don't hijack typing in text inputs
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if ([' ','arrowleft','arrowright','arrowup','arrowdown','z'].includes(k)) e.preventDefault();
      if (!this.held[k]) this.pressed[k] = true;
      if (k === ' ' && !this.held[k]) this.jumpBuffer = Config.jumpBufferTime;
      this.held[k] = true;
    });
    window.addEventListener('keyup', e => {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      this.held[e.key.toLowerCase()] = false;
    });
  },
  update(dt) { if (this.jumpBuffer > 0) this.jumpBuffer -= dt; },
  down(k)     { return !!this.held[k.toLowerCase()]; },
  tap(k)      { const v = this.pressed[k.toLowerCase()]; this.pressed[k.toLowerCase()] = false; return !!v; },
  consumeJump() { if (this.jumpBuffer > 0) { this.jumpBuffer = 0; return true; } return false; }
};
Input.init();

// -------------------------------------------------------------
// Audio — music loop + sfx (Web Audio synthesized)
// -------------------------------------------------------------
const Audio = {
  ctx: null,
  musicStarted: false,
  _music: null,
  _ctx() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); return this.ctx; },

  sfx(freq, dur, type = 'square', vol = 0.1) {
    const c = this._ctx(); const now = c.currentTime;
    const o = c.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(c.destination);
    o.start(now); o.stop(now + dur + 0.02);
  },
  jump()   { this.sfx(560, 0.08, 'square', 0.06); this.sfx(720, 0.08, 'square', 0.05); },
  attack() { this.sfx(220, 0.07, 'sawtooth', 0.08); },
  hit()    { this.sfx(900, 0.05, 'square', 0.12); this.sfx(300, 0.09, 'square', 0.08); },
  hurt()   { this.sfx(140, 0.2, 'sawtooth', 0.18); },
  die()    {
    this.sfx(200, 0.14, 'sawtooth', 0.15);
    setTimeout(() => this.sfx(120, 0.2, 'sawtooth', 0.12), 80);
    setTimeout(() => this.sfx(80, 0.35, 'sawtooth', 0.1), 160);
  },
  stare()  { this.sfx(1100, 0.05, 'sine', 0.06); },

  // creepy looping ambient music
  startMusic() {
    if (this.musicStarted) return;
    this.musicStarted = true;
    const c = this._ctx();
    // low drone
    const drone = c.createOscillator(); drone.type = 'sawtooth'; drone.frequency.value = 55;
    const df = c.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 180;
    const dg = c.createGain(); dg.gain.value = 0.04;
    drone.connect(df); df.connect(dg); dg.connect(c.destination);
    drone.start();

    // noise wash
    const bs = 2 * c.sampleRate;
    const nb = c.createBuffer(1, bs, c.sampleRate);
    const d = nb.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
    const ns = c.createBufferSource(); ns.buffer = nb; ns.loop = true;
    const nf = c.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 400; nf.Q.value = 0.8;
    const ng = c.createGain(); ng.gain.value = 0.03;
    ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
    ns.start();

    // occasional eerie tones
    const eerieNotes = [220, 165, 277, 185, 146];
    let i = 0;
    const eerieLoop = () => {
      if (!this.musicStarted) return;
      const n = eerieNotes[i % eerieNotes.length]; i++;
      const now = c.currentTime;
      const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = n;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.04, now + 0.5);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(now); o.stop(now + 3.3);
      setTimeout(eerieLoop, 4500 + Math.random() * 3000);
    };
    setTimeout(eerieLoop, 2000);
  }
};

// -------------------------------------------------------------
// Camera — with shake
// -------------------------------------------------------------
const Camera = {
  x: 0, y: 0, shake: 0,
  update() {
    const target = Player.x + Player.w / 2 - W / 2;
    this.x += (target - this.x) * 0.14;
    this.x = Math.max(0, Math.min(Config.worldWidth - W, this.x));
    this.shake *= 0.82;
  },
  shakeNow(amt) { this.shake = Math.max(this.shake, amt); },
  offsetX() { return (Math.random() - 0.5) * this.shake; },
  offsetY() { return (Math.random() - 0.5) * this.shake; }
};

// -------------------------------------------------------------
// Effects — flash overlay, particles, damage numbers
// -------------------------------------------------------------
const Effects = {
  particles: [],
  dmgNums: [],

  hitFlash(intensity = 0.4) {
    const el = document.getElementById('flash');
    el.style.opacity = intensity;
    setTimeout(() => { el.style.opacity = '0'; }, 80);
  },
  spawnBurst(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 6,
        vy: -2 - Math.random() * 4,
        life: 1,
        color
      });
    }
  },
  spawnDamageNum(x, y, text, crit = false) {
    this.dmgNums.push({ x, y, text, crit, life: 1 });
  },
  update(dt) {
    for (const p of this.particles) {
      p.vy += 0.35; p.x += p.vx; p.y += p.vy; p.life -= dt * 1.5;
    }
    this.particles = this.particles.filter(p => p.life > 0);
    for (const d of this.dmgNums) { d.y -= 40 * dt; d.life -= dt * 1.3; }
    this.dmgNums = this.dmgNums.filter(d => d.life > 0);
  },
  draw() {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - Camera.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
    for (const d of this.dmgNums) {
      ctx.globalAlpha = d.life;
      ctx.font = `bold ${d.crit ? 22 : 16}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
      ctx.strokeText(d.text, d.x - Camera.x, d.y);
      ctx.fillStyle = d.crit ? '#ffe64a' : '#fff';
      ctx.fillText(d.text, d.x - Camera.x, d.y);
    }
    ctx.globalAlpha = 1;
  }
};

// -------------------------------------------------------------
// Rectangle overlap
// -------------------------------------------------------------
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// -------------------------------------------------------------
// Player — responsive platforming
// -------------------------------------------------------------
const Player = {
  x: 80, y: 400, w: 32, h: 48,
  vx: 0, vy: 0,
  facing: 1,
  onGround: false,
  coyote: 0,
  jumpHold: 0,
  hp: Config.playerMaxHP,
  maxHp: Config.playerMaxHP,
  invuln: 0,
  attackTimer: 0,
  attackCooldown: 0,
  animT: 0,
  hitFlash: 0,

  reset() {
    this.x = 80; this.y = 400;
    this.vx = 0; this.vy = 0;
    this.hp = this.maxHp;
    this.invuln = 0;
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.coyote = 0; this.jumpHold = 0;
  },

  update(dt) {
    this.animT += dt;
    if (this.invuln > 0) this.invuln -= dt;
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.attackTimer > 0) this.attackTimer -= dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;

    // horizontal
    this.vx = 0;
    if (Input.down('arrowleft'))  { this.vx = -Config.moveSpeed; this.facing = -1; }
    if (Input.down('arrowright')) { this.vx = +Config.moveSpeed; this.facing = +1; }

    // jump with coyote + buffer + variable height
    if (this.onGround) this.coyote = Config.coyoteTime;
    else this.coyote -= dt;

    if (Input.consumeJump() && this.coyote > 0) {
      this.vy = -Config.jumpInitial;
      this.jumpHold = Config.jumpMaxHoldTime;
      this.onGround = false;
      this.coyote = 0;
      Audio.jump();
    }
    if (Input.down(' ') && this.jumpHold > 0 && this.vy < 0) {
      this.vy -= Config.jumpHoldBoost;
      this.jumpHold -= dt;
    } else {
      this.jumpHold = 0;
    }

    // attack
    if (Input.tap('z') && this.attackCooldown <= 0) {
      this.attackTimer = Config.attackDuration;
      this.attackCooldown = Config.attackCooldown;
      Audio.attack();
      Combat.performAttack();
    }

    // gravity
    this.vy += Config.gravity;
    if (this.vy > 17) this.vy = 17;

    // integrate horizontal
    this.x += this.vx;
    this.x = Math.max(0, Math.min(Config.worldWidth - this.w, this.x));

    // integrate vertical with platform landing
    this.y += this.vy;
    this.onGround = false;
    for (const p of Level.platforms) {
      if (this.vy >= 0 &&
          this.x + this.w > p.x && this.x < p.x + p.w &&
          this.y + this.h >= p.y && this.y + this.h <= p.y + Math.max(20, p.h)) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.onGround = true;
      }
    }

    // death by fall
    if (this.y > H + 100) this.hit(30);
  },

  hit(dmg, fromX) {
    if (this.invuln > 0) return;
    this.hp = Math.max(0, this.hp - dmg);
    this.invuln = Config.enemyContactCooldown;
    this.hitFlash = 0.25;
    // knockback
    if (fromX !== undefined) this.vx = this.x < fromX ? -7 : 7;
    this.vy = -6;
    Audio.hurt();
    Effects.hitFlash(0.45);
    Camera.shakeNow(10);
    Effects.spawnDamageNum(this.x + this.w / 2, this.y - 10, dmg);
    if (this.hp <= 0) Game.gameOver();
  },

  attackBox() {
    const ax = this.facing > 0 ? this.x + this.w : this.x - Config.attackReach;
    return { x: ax, y: this.y + 6, w: Config.attackReach, h: this.h - 12 };
  },

  draw() {
    const sx = this.x - Camera.x + Camera.offsetX();
    const sy = this.y + Camera.offsetY();
    // invuln blink
    if (this.invuln > 0 && Math.floor(this.invuln * 20) % 2 === 0) return;

    // hit tint
    if (this.hitFlash > 0) ctx.filter = 'brightness(2.5)';

    // legs
    ctx.fillStyle = '#2a3a5a';
    const walking = Math.abs(this.vx) > 0.1 && this.onGround;
    const swing = walking ? Math.sin(this.animT * 16) * 3 : 0;
    ctx.fillRect(sx + 6, sy + 30, 8, 18 - swing);
    ctx.fillRect(sx + 18, sy + 30, 8, 18 + swing);
    // body
    ctx.fillStyle = '#4288dd';
    ctx.fillRect(sx + 4, sy + 14, 24, 20);
    // belt
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(sx + 4, sy + 30, 24, 3);
    // head
    ctx.fillStyle = '#f2c69a';
    ctx.fillRect(sx + 6, sy, 20, 16);
    // hair
    ctx.fillStyle = '#3a2412';
    ctx.fillRect(sx + 4, sy, 24, 6);
    // eyes
    ctx.fillStyle = '#000';
    const ex = this.facing > 0 ? sx + 18 : sx + 8;
    ctx.fillRect(ex, sy + 8, 3, 3);

    // arm + attack
    if (this.attackTimer > 0) {
      const box = this.attackBox();
      ctx.fillStyle = 'rgba(255,220,120,0.5)';
      ctx.fillRect(box.x - Camera.x, box.y, box.w, box.h);
      // blade
      ctx.fillStyle = '#e0e4ee';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 18, 46, 6);
      else ctx.fillRect(sx - 46, sy + 18, 46, 6);
      ctx.fillStyle = '#8e9ab0';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 20, 46, 2);
      else ctx.fillRect(sx - 46, sy + 20, 46, 2);
    } else {
      ctx.fillStyle = '#f2c69a';
      if (this.facing > 0) ctx.fillRect(sx + 24, sy + 18, 5, 12);
      else ctx.fillRect(sx + 3, sy + 18, 5, 12);
    }

    ctx.filter = 'none';
  }
};

// -------------------------------------------------------------
// Enemy — AI: patrol / chase / stare / aggression, death anim
// -------------------------------------------------------------
const Enemy = {
  image: null,
  imageKeyed: null,  // background-removed version
  imageReady: false,
  useDefault: true,  // use procedurally drawn default monster

  list: [],

  setImage(img) {
    this.useDefault = false;
    this.image = img;
    this.imageReady = true;
    // pre-key background
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    const cc = c.getContext('2d');
    cc.drawImage(img, 0, 0);
    try {
      const id = cc.getImageData(0, 0, c.width, c.height);
      const d = id.data;
      const bR = d[0], bG = d[1], bB = d[2];
      for (let i = 0; i < d.length; i += 4) {
        const dist = Math.hypot(d[i] - bR, d[i+1] - bG, d[i+2] - bB);
        const isCyan = d[i+2] > 140 && d[i+1] > 130 && d[i] < 210 && d[i+2] > d[i] + 20;
        if (dist < 40 || (isCyan && dist < 110)) d[i+3] = 0;
        else if (dist < 75) d[i+3] = Math.floor(((dist - 40) / 35) * 255);
      }
      cc.putImageData(id, 0, 0);
      const out = new Image(); out.src = c.toDataURL('image/png');
      this.imageKeyed = out;
    } catch (e) {}
  },

  spawn(x, y, hpMult = 1) {
    this.list.push({
      x, y, w: 48, h: 64,
      vx: 0, vy: 0,
      hp: Math.floor(40 * hpMult),
      maxHp: Math.floor(40 * hpMult),
      facing: -1,
      onGround: false,
      bob: Math.random() * 6,
      // AI state
      ai: 'PATROL',
      aiTimer: 1 + Math.random() * 2,
      patrolDir: Math.random() < 0.5 ? -1 : 1,
      aggression: 0,        // 0..1 — how much player has been looking
      starePose: 0,         // timer for stare animation
      speedBoost: 0,        // short burst when player very close
      // hit / death
      hitFlash: 0,
      dying: false,
      dyingT: 0,
      justHitCooldown: 0,
    });
  },

  allDead() { return this.list.every(e => e.dying || e.hp <= 0); },

  update(dt) {
    for (const e of this.list) {
      e.bob += dt;
      if (e.hitFlash > 0) e.hitFlash -= dt;
      if (e.justHitCooldown > 0) e.justHitCooldown -= dt;

      // death animation
      if (e.dying) {
        e.dyingT += dt;
        e.vy += Config.gravity * 0.6;
        e.y += e.vy;
        e.x += e.vx * 0.5;
        e.vx *= 0.94;
        continue;
      }

      // distance to player
      const dx = (Player.x + Player.w / 2) - (e.x + e.w / 2);
      const dy = (Player.y + Player.h / 2) - (e.y + e.h / 2);
      const dist = Math.hypot(dx, dy);

      // is player looking at this enemy? (enemy is on screen, player facing toward)
      const onScreen = (e.x + e.w > Camera.x && e.x < Camera.x + W);
      const lookingAt = onScreen && dist < 600 &&
        ((Player.facing > 0 && dx > 0) || (Player.facing < 0 && dx < 0));

      if (lookingAt) e.aggression = Math.min(1, e.aggression + dt * 0.2);
      else e.aggression = Math.max(0, e.aggression - dt * 0.08);

      // AI state machine
      e.aiTimer -= dt;
      const farDist = 280;
      const closeDist = 150;

      // Occasionally stare
      if (e.ai === 'PATROL' && e.aiTimer <= 0 && Math.random() < 0.3) {
        e.ai = 'STARE';
        e.aiTimer = 0.8 + Math.random() * 1.0;
        Audio.stare();
      }

      if (e.ai === 'STARE') {
        // face player, don't move
        e.vx = 0;
        e.facing = dx < 0 ? -1 : 1;
        e.starePose = 1;
        if (e.aiTimer <= 0) {
          e.ai = dist < farDist ? 'CHASE' : 'PATROL';
          e.aiTimer = 1.5 + Math.random() * 2;
        }
      } else if (dist < farDist) {
        // chase
        e.ai = 'CHASE';
        // base chase speed increases with aggression
        const baseSpeed = 1.6 + e.aggression * 2.5;
        // sudden burst when very close
        if (dist < closeDist && e.speedBoost <= 0 && Math.random() < 0.02) {
          e.speedBoost = 0.4;
          Audio.stare();
        }
        if (e.speedBoost > 0) { e.speedBoost -= dt; }
        const speed = baseSpeed + (e.speedBoost > 0 ? 3 : 0);
        e.vx = Math.sign(dx) * speed;
        e.facing = e.vx < 0 ? -1 : 1;
      } else {
        // patrol
        e.ai = 'PATROL';
        e.vx = e.patrolDir * 1.4;
        e.facing = e.patrolDir;
        if (e.aiTimer <= 0) {
          e.patrolDir *= -1;
          e.aiTimer = 2 + Math.random() * 3;
        }
      }

      // physics
      e.vy += Config.gravity;
      if (e.vy > 16) e.vy = 16;
      e.x += e.vx;
      e.x = Math.max(0, Math.min(Config.worldWidth - e.w, e.x));
      e.y += e.vy;
      e.onGround = false;
      let platformUnder = null;
      for (const p of Level.platforms) {
        if (e.vy >= 0 &&
            e.x + e.w > p.x && e.x < p.x + p.w &&
            e.y + e.h >= p.y && e.y + e.h <= p.y + Math.max(20, p.h)) {
          e.y = p.y - e.h;
          e.vy = 0;
          e.onGround = true;
          platformUnder = p;
        }
      }
      // patrol turnaround at edges
      if (e.ai === 'PATROL' && platformUnder) {
        if (e.x < platformUnder.x + 4) { e.patrolDir = 1; }
        if (e.x + e.w > platformUnder.x + platformUnder.w - 4) { e.patrolDir = -1; }
      }

      // contact damage
      if (e.justHitCooldown <= 0 && rectsOverlap(e, Player)) {
        Player.hit(Config.enemyContactDamage, e.x + e.w / 2);
        e.justHitCooldown = 0.4;
      }
    }

    // remove enemies that finished dying
    this.list = this.list.filter(e => !(e.dying && e.dyingT > 1.2));
  },

  damage(e, dmg, fromFacing) {
    e.hp -= dmg;
    e.hitFlash = 0.15;
    e.x += fromFacing * 18; // knockback
    Audio.hit();
    Camera.shakeNow(5);
    const crit = Math.random() < 0.18;
    Effects.spawnDamageNum(e.x + e.w / 2, e.y, crit ? Math.floor(dmg * 1.5) : dmg, crit);
    if (e.hp <= 0 && !e.dying) {
      e.dying = true;
      e.dyingT = 0;
      e.vy = -6;
      e.vx = fromFacing * 3;
      Audio.die();
      Effects.spawnBurst(e.x + e.w / 2, e.y + e.h / 2, '#e8c547', 14);
      Score.addKill(Stage.current, crit);
      Stage.onEnemyKilled();
    }
  },

  draw() {
    for (const e of this.list) {
      const sx = e.x - Camera.x + Camera.offsetX();
      const sy = e.y + Camera.offsetY();
      if (sx + e.w < -20 || sx > W + 20) continue;
      const bob = Math.sin(e.bob * 3) * 2;
      const shake = (e.ai === 'STARE' || e.aggression > 0.5) ? (Math.random() - 0.5) * 1.5 : 0;

      ctx.save();

      // fade out while dying
      if (e.dying) ctx.globalAlpha = Math.max(0, 1 - e.dyingT / 1.2);

      // hit flash
      if (e.hitFlash > 0) ctx.filter = 'brightness(2.5)';

      // red aura when aggression high
      if (e.aggression > 0.4) {
        const aura = ctx.createRadialGradient(
          sx + e.w / 2, sy + e.h / 2, 10,
          sx + e.w / 2, sy + e.h / 2, e.w * 1.3
        );
        aura.addColorStop(0, `rgba(180,0,0,${0.2 * e.aggression})`);
        aura.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = aura;
        ctx.fillRect(sx - e.w, sy - e.h, e.w * 3, e.h * 3);
      }

      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(sx + e.w / 2, sy + e.h, e.w * 0.45, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      if (this.imageReady && !this.useDefault) {
        const src = this.imageKeyed && this.imageKeyed.complete ? this.imageKeyed : this.image;
        ctx.translate(sx + e.w / 2 + shake, sy + bob + shake);
        ctx.scale(e.facing < 0 ? -1 : 1, 1);
        if (e.dying) ctx.rotate((e.facing < 0 ? 1 : -1) * e.dyingT * 1.5);
        const ar = src.width / src.height;
        const h = e.h;
        const w = h * ar;
        ctx.drawImage(src, -w / 2, 0, w, h);
      } else {
        // Built-in default monster — a creepy pale humanoid
        ctx.translate(sx + e.w / 2 + shake, sy + bob + shake);
        ctx.scale(e.facing < 0 ? -1 : 1, 1);
        if (e.dying) ctx.rotate((e.facing < 0 ? 1 : -1) * e.dyingT * 1.5);
        drawDefaultMonster(e);
      }

      ctx.restore();
      ctx.filter = 'none';
      ctx.globalAlpha = 1;

      // hp bar
      if (!e.dying && e.hp < e.maxHp) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(sx, sy - 8, e.w, 4);
        ctx.fillStyle = '#ff5050';
        ctx.fillRect(sx + 1, sy - 7, (e.w - 2) * (e.hp / e.maxHp), 2);
      }
    }
  }
};

// -------------------------------------------------------------
// Combat
// -------------------------------------------------------------
const Combat = {
  performAttack() {
    const box = Player.attackBox();
    for (const e of Enemy.list) {
      if (e.dying) continue;
      if (rectsOverlap(box, e)) {
        const crit = Math.random() < 0.2;
        Enemy.damage(e, crit ? Math.floor(Config.attackDamage * 1.5) : Config.attackDamage, Player.facing);
      }
    }
  }
};

// -------------------------------------------------------------
// Stage — spawning waves, progression
// -------------------------------------------------------------
const Stage = {
  current: 1,
  targetKills: 5,
  kills: 0,
  hpMult: 1,

  start(n) {
    this.current = n;
    this.hpMult = 1 + (n - 1) * 0.35;
    this.targetKills = 4 + n;
    this.kills = 0;
    Enemy.list.length = 0;
    // spawn positions across the stage
    const positions = [
      [500, 420], [800, 420], [1200, 420], [1600, 420],
      [2000, 420], [2400, 420], [2800, 420], [3200, 420],
      [520, 300], [1020, 380], [1870, 340], [2420, 360],
    ];
    const numSpawn = Math.min(positions.length, this.targetKills + 2);
    for (let i = 0; i < numSpawn; i++) {
      Enemy.spawn(positions[i][0], positions[i][1], this.hpMult);
    }
    updateHUD();
  },
  onEnemyKilled() {
    this.kills++;
    updateHUD();
    if (this.kills >= this.targetKills) {
      setTimeout(() => Game.stageClear(), 800);
    }
  }
};

// -------------------------------------------------------------
// Renderer
// -------------------------------------------------------------
const Renderer = {
  draw() {
    // sky gradient (darker at higher stages)
    const nightAmt = Math.min(1, (Stage.current - 1) * 0.25);
    const topC = lerpColor('#7ec8e8', '#1a1830', nightAmt);
    const botC = lerpColor('#c7e8c0', '#2a2530', nightAmt);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, topC);
    g.addColorStop(1, botC);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // moon (appears in later stages)
    if (nightAmt > 0.2) {
      ctx.fillStyle = `rgba(255,255,220,${nightAmt})`;
      ctx.beginPath(); ctx.arc(W - 140, 100, 36, 0, Math.PI * 2); ctx.fill();
    }

    // far hills (parallax x0.15)
    ctx.fillStyle = lerpColor('#8fb08a', '#2a3a2a', nightAmt);
    const par1 = Camera.x * 0.15;
    for (let i = -1; i < Math.ceil(W / 400) + 2; i++) {
      const hx = i * 400 - (par1 % 400);
      ctx.beginPath();
      ctx.moveTo(hx, H);
      ctx.quadraticCurveTo(hx + 200, H - 240, hx + 400, H);
      ctx.fill();
    }
    // mid hills (parallax x0.3)
    ctx.fillStyle = lerpColor('#6f9a6b', '#1c2a1c', nightAmt);
    const par2 = Camera.x * 0.3;
    for (let i = -1; i < Math.ceil(W / 280) + 2; i++) {
      const hx = i * 280 - (par2 % 280);
      ctx.beginPath();
      ctx.moveTo(hx, H);
      ctx.quadraticCurveTo(hx + 140, H - 180, hx + 280, H);
      ctx.fill();
    }
    // clouds (parallax x0.08)
    ctx.fillStyle = `rgba(255,255,255,${0.8 - nightAmt * 0.6})`;
    const par3 = Camera.x * 0.08;
    for (let i = 0; i < 10; i++) {
      const x = ((i * 400 - par3) % (W + 400)) - 100;
      const y = 50 + (i * 41) % 120;
      drawCloud(x, y, 28 + (i * 7) % 22);
    }

    // platforms
    for (const p of Level.platforms) {
      const sx = p.x - Camera.x + Camera.offsetX();
      const sy = p.y + Camera.offsetY();
      if (sx + p.w < 0 || sx > W) continue;
      ctx.fillStyle = lerpColor('#6ac46a', '#2e4a2e', nightAmt);
      ctx.fillRect(sx, sy, p.w, 6);
      ctx.fillStyle = lerpColor('#8b5a2b', '#3a2816', nightAmt);
      ctx.fillRect(sx, sy + 6, p.w, p.h - 6);
      // grass tufts
      ctx.fillStyle = lerpColor('#4ea04e', '#1a2a1a', nightAmt);
      for (let i = 8; i < p.w - 8; i += 24) {
        ctx.fillRect(sx + i, sy - 3, 2, 4);
        ctx.fillRect(sx + i + 2, sy - 2, 2, 3);
      }
    }

    Enemy.draw();
    Player.draw();
    Effects.draw();
  }
};

// Built-in creepy monster — original canvas drawing (no external asset)
function drawDefaultMonster(e) {
  const w = e.w, h = e.h;
  const agg = e.aggression || 0;

  // torso (tattered robe)
  const robeGrad = ctx.createLinearGradient(0, 0, 0, h);
  robeGrad.addColorStop(0, '#2a2432');
  robeGrad.addColorStop(1, '#0e0c14');
  ctx.fillStyle = robeGrad;
  ctx.beginPath();
  ctx.moveTo(-w * 0.35, h * 0.45);
  ctx.lineTo(-w * 0.5, h);
  ctx.lineTo(-w * 0.35, h * 0.95);
  ctx.lineTo(-w * 0.2, h);
  ctx.lineTo(-w * 0.05, h * 0.95);
  ctx.lineTo(w * 0.1, h);
  ctx.lineTo(w * 0.3, h * 0.95);
  ctx.lineTo(w * 0.5, h);
  ctx.lineTo(w * 0.35, h * 0.45);
  ctx.closePath();
  ctx.fill();

  // skinny arms
  ctx.strokeStyle = '#d8cfae';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  // left arm dangling
  ctx.beginPath();
  ctx.moveTo(-w * 0.3, h * 0.5);
  ctx.quadraticCurveTo(-w * 0.55, h * 0.65, -w * 0.45, h * 0.85);
  ctx.stroke();
  // right arm — stretches toward player when aggressive
  ctx.beginPath();
  ctx.moveTo(w * 0.3, h * 0.5);
  const reach = 0.55 + agg * 0.25;
  ctx.quadraticCurveTo(w * reach, h * 0.55, w * (reach + 0.1), h * (0.75 - agg * 0.15));
  ctx.stroke();
  // bony fingers on the stretching hand
  ctx.lineWidth = 2;
  const hx = w * (reach + 0.1), hy = h * (0.75 - agg * 0.15);
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx + (2 + i) * 1.5, hy + (i - 1) * 3 + 4);
    ctx.stroke();
  }

  // neck
  ctx.fillStyle = '#d8cfae';
  ctx.fillRect(-w * 0.08, h * 0.3, w * 0.16, h * 0.12);

  // head — elongated oval
  const headGrad = ctx.createRadialGradient(-w * 0.1, h * 0.12, w * 0.05, 0, h * 0.2, w * 0.5);
  headGrad.addColorStop(0, '#ece3c2');
  headGrad.addColorStop(0.7, '#c2b896');
  headGrad.addColorStop(1, '#7a6e52');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.2, w * 0.32, h * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // dark hollow eye sockets
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(-w * 0.12, h * 0.18, w * 0.08, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.12, h * 0.18, w * 0.08, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  // glowing pupils — intensify with aggression
  const glow = agg > 0.3 ? `rgba(255,${Math.floor(80 - agg * 60)},${Math.floor(80 - agg * 70)},1)` : '#3a2a2a';
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(-w * 0.12, h * 0.19, w * 0.025, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w * 0.12, h * 0.19, w * 0.025, 0, Math.PI * 2);
  ctx.fill();

  // wide crescent smile — gets wider with aggression
  const smileW = w * (0.22 + agg * 0.08);
  const smileY = h * 0.28;
  ctx.strokeStyle = '#2a1010';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-smileW, smileY);
  ctx.quadraticCurveTo(0, smileY + h * (0.06 + agg * 0.04), smileW, smileY);
  ctx.stroke();
  // dark mouth interior
  ctx.fillStyle = '#100808';
  ctx.beginPath();
  ctx.moveTo(-smileW + 1, smileY + 1);
  ctx.quadraticCurveTo(0, smileY + h * (0.06 + agg * 0.04), smileW - 1, smileY + 1);
  ctx.quadraticCurveTo(0, smileY + h * (0.03 + agg * 0.03), -smileW + 1, smileY + 1);
  ctx.fill();
  // jagged teeth
  ctx.fillStyle = '#e8e2c8';
  const teethN = 5;
  for (let i = 0; i < teethN; i++) {
    const tx = -smileW + (i + 0.5) * (smileW * 2 / teethN);
    const th = 2 + (i % 2) * 2;
    ctx.fillRect(tx - 1, smileY + 1, 2, th);
  }

  // ragged hair / shroud on top
  ctx.fillStyle = '#1a1420';
  ctx.beginPath();
  ctx.moveTo(-w * 0.3, h * 0.08);
  ctx.quadraticCurveTo(-w * 0.2, -h * 0.05, 0, -h * 0.03);
  ctx.quadraticCurveTo(w * 0.2, -h * 0.05, w * 0.3, h * 0.08);
  ctx.quadraticCurveTo(w * 0.15, h * 0.02, 0, h * 0.04);
  ctx.quadraticCurveTo(-w * 0.15, h * 0.02, -w * 0.3, h * 0.08);
  ctx.fill();
  // stray hair strands
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * w * 0.07, h * 0.02);
    ctx.lineTo(i * w * 0.07 + (Math.random() - 0.5) * 3, -h * 0.08 - Math.abs(i) * 2);
    ctx.strokeStyle = '#1a1420';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y + r * 0.2, r * 0.75, 0, Math.PI * 2);
  ctx.arc(x - r * 0.7, y + r * 0.1, r * 0.65, 0, Math.PI * 2);
  ctx.fill();
}

function lerpColor(c1, c2, t) {
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  const r = Math.floor(p1.r + (p2.r - p1.r) * t);
  const g = Math.floor(p1.g + (p2.g - p1.g) * t);
  const b = Math.floor(p1.b + (p2.b - p1.b) * t);
  return `rgb(${r},${g},${b})`;
}
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

  reset() { this.current = 0; updateHUD(); },
  addKill(stage, crit) {
    const pts = Math.floor((crit ? 150 : 100) * stage);

// -------------------------------------------------------------
// -------------------------------------------------------------
// REMOTE — shared leaderboard via JSONBin.io (free, 2-line setup)
//   1) https://jsonbin.io 에 무료 가입
//   2) "Create a Bin" → 내용을 아래와 같이 입력:
//        { "leaderboard": [] }
//   3) 만든 Bin의 BIN ID와, My Profile → API Keys → X-MASTER-KEY 를 복사
//   4) 아래 BIN_ID, API_KEY 에 붙여넣고 enabled: true 로 변경
//   → 이 HTML 을 쓰는 모든 유저가 같은 랭킹을 공유합니다.
//   설정 안 해도 localStorage 기반 개인 랭킹은 그대로 작동합니다.
// -------------------------------------------------------------
const REMOTE = {
  enabled: true,
  BIN_ID: '69e823b3856a6821895bf7cc',
  API_KEY: '$2a$10$pZS16G2nnMeCzkQXIvEx5OHSBHM4mro/fgW9ZP0DTNRWEASoiJYd6',

  _base() { return `https://api.jsonbin.io/v3/b/${this.BIN_ID}`; },
  _headers() { return { 'Content-Type': 'application/json', 'X-Master-Key': this.API_KEY, 'X-Bin-Meta': 'false' }; },
  _withTimeout(ms) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    return { signal: ctrl.signal, done: () => clearTimeout(t) };
  },

  async fetch() {
    if (!this.enabled) return null;
    const to = this._withTimeout(8000);
    try {
      const res = await window.fetch(this._base() + '/latest', { headers: this._headers(), signal: to.signal });
      to.done();
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        console.warn('[JUNO FLOW] JSONBin GET not ok:', res.status, txt.slice(0, 200));
        return null;
      }
      const j = await res.json();
      // with X-Bin-Meta: false, response IS the record directly
      // without it, it's { record, metadata }
      const record = (j && j.record) ? j.record : j;
      const list = (record && Array.isArray(record.leaderboard)) ? record.leaderboard :
                   (Array.isArray(record) ? record : []);
      return Array.isArray(list) ? list : [];
    } catch (e) {
      to.done();
      console.warn('[JUNO FLOW] JSONBin GET error:', e && (e.name + ': ' + e.message));
      return null;
    }
  },
  async push(entries) {
    if (!this.enabled) return false;
    const to = this._withTimeout(8000);
    try {
      const res = await window.fetch(this._base(), {
        method: 'PUT', headers: this._headers(),
        body: JSON.stringify({ leaderboard: entries }),
        signal: to.signal
      });
      to.done();
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        console.warn('[JUNO FLOW] JSONBin PUT not ok:', res.status, txt.slice(0, 200));
        return false;
      }
      return true;
    } catch (e) {
      to.done();
      console.warn('[JUNO FLOW] JSONBin PUT error:', e && (e.name + ': ' + e.message));
      return false;
    }
  }
};

const Leaderboard = {
  KEY: 'junoFlowLeaderboard',
  USER_KEY: 'junoFlowUsername',
  MAX: 50,
  entries: [],
  _mem: { board: null, user: '' }, // in-memory fallback when localStorage blocked
  _syncing: false,

  _lsAvailable() {
    try {
      localStorage.setItem('__jf_test__', '1');
      localStorage.removeItem('__jf_test__');
      return true;
    } catch (_) { return false; }
  },
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      this.entries = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(this.entries)) this.entries = [];
    } catch (_) {
      this.entries = Array.isArray(this._mem.board) ? this._mem.board.slice() : [];
    }
  },
  save() {
    this._mem.board = this.entries.slice(); // always keep in-memory copy
    try { localStorage.setItem(this.KEY, JSON.stringify(this.entries)); } catch (_) {}
  },
  loadUsername() {
    try { return localStorage.getItem(this.USER_KEY) || this._mem.user || ''; }
    catch (_) { return this._mem.user || ''; }
  },
  saveUsername(name) {
    this._mem.user = name;
    try { localStorage.setItem(this.USER_KEY, name); } catch (_) {}
  },
  _merge(a, b) {
    const seen = new Set();
    const out = [];
    for (const e of [...(a || []), ...(b || [])]) {
      if (!e || typeof e !== 'object') continue;
      const k = `${e.name}|${e.score}|${e.stage}|${e.date}`;
      if (seen.has(k)) continue;
      seen.add(k);
      out.push({
        name: String(e.name || 'Player').slice(0, 16),
        score: e.score | 0,
        stage: e.stage | 0,
        kills: e.kills | 0,
        date: e.date | 0
      });
    }
    out.sort((a, b) => b.score - a.score || b.stage - a.stage || a.date - b.date);
    return out.slice(0, this.MAX);
  },
  submit(name, score, stage, kills) {
    const entry = { name: (name || 'Player').slice(0, 16), score: score | 0, stage: stage | 0, kills: kills | 0, date: Date.now() };
    this.entries = this._merge(this.entries, [entry]);
    this.save();
    const localRank = this.entries.indexOf(entry) + 1;
    // fire-and-forget remote sync (non-blocking)
    this._syncRemote(entry);
    return localRank; // instant local rank
  },
  async _syncRemote(newEntry) {
    if (!REMOTE.enabled || this._syncing) return;
    this._syncing = true;
    setSyncStatus('syncing');
    try {
      const remote = await REMOTE.fetch();
      const merged = this._merge(remote || [], this.entries);
      const ok = await REMOTE.push(merged);
      if (ok) {
        this.entries = merged;
        this.save();
        this.render(Session.username);
        setSyncStatus('ok');
      } else {
        setSyncStatus('fail');
      }
    } catch (_) {
      setSyncStatus('fail');
    } finally {
      this._syncing = false;
    }
  },
  async loadRemote() {
    if (!REMOTE.enabled) return;
    setSyncStatus('syncing');
    const remote = await REMOTE.fetch();
    if (remote) {
      this.entries = this._merge(this.entries, remote);
      this.save();
      this.render(Session.username);
      setSyncStatus('ok');
    } else {
      setSyncStatus('fail');
    }
  },
  render(highlightName) {
    if (!leaderboardBody) return;
    leaderboardBody.innerHTML = '';
    const top = this.entries.slice(0, 10);
    if (top.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="4" class="empty">아직 기록이 없습니다. 첫 번째 랭커가 되어보세요.</td>';
      leaderboardBody.appendChild(tr);
      return;
    }
    top.forEach((e, i) => {
      const tr = document.createElement('tr');
      if (i === 0) tr.classList.add('top1');
      else if (i === 1) tr.classList.add('top2');
      else if (i === 2) tr.classList.add('top3');
      if (highlightName && e.name === highlightName) tr.classList.add('you');
      tr.innerHTML =
        `<td><span class="rank">${i + 1}</span></td>` +
        `<td>${escapeHTML(e.name)}</td>` +
        `<td class="right">${e.score.toLocaleString()}</td>` +
        `<td class="right">S${e.stage}</td>`;
      leaderboardBody.appendChild(tr);
    });
  }
};
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function updateHUD() {

}

function updateTint() {
  // tint based on nearest enemy proximity
  let minDist = Infinity;
  for (const e of Enemy.list) {
    if (e.dying) continue;
    const dx = Player.x - e.x;
    const dy = Player.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < minDist) minDist = d;
  }
  const prox = Math.max(0, Math.min(1, 1 - minDist / 400));
  tintEl.style.background = `radial-gradient(circle at center, rgba(0,0,0,0) 30%, rgba(80,0,0,${prox * 0.45}) 100%)`;
}

function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      Enemy.setImage(img);
      preview.src = e.target.result;
      previewWrap.classList.add('show');
      startDrop.classList.add('ok');
      uploadPanel.classList.add('ok');
      actionBtn.disabled = false;
      startDrop.querySelector('div:first-child').textContent = '✓ 준비됨';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
startFile.addEventListener('change', e => { if (e.target.files[0]) loadImageFile(e.target.files[0]); });
monsterFile.addEventListener('change', e => { if (e.target.files[0]) loadImageFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev => startDrop.addEventListener(ev, e => { e.preventDefault(); startDrop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => startDrop.addEventListener(ev, e => { e.preventDefault(); startDrop.classList.remove('drag'); }));
startDrop.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]); });
window.addEventListener('paste', e => {
  if (!e.clipboardData || Game.state === 'playing') return;
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) { loadImageFile(item.getAsFile()); break; }
  }
});

// -------------------------------------------------------------
// Game — state machine + loop
// -------------------------------------------------------------
const Game = {
  state: 'start',     // 'start' | 'playing' | 'gameover' | 'stageclear'
  lastT: 0,

  showOverlay(title, sub, body, btnText) {
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    overlayBody.innerHTML = body;
    actionBtn.textContent = btnText;
    overlayEl.classList.remove('hidden');
    hudEl.style.display = 'none';
    uploadPanel.style.display = 'none';
  },

  hideOverlay() {
    overlayEl.classList.add('hidden');
    hudEl.style.display = '';
    uploadPanel.style.display = '';
    rankPopupEl.textContent = '';
  },

  _ensureUsername() {
    const v = nameInputEl.value.trim();
    if (!v) {
      nameInputEl.focus();
      nameInputEl.style.borderColor = '#ff6464';
      setTimeout(() => { nameInputEl.style.borderColor = ''; }, 1200);
      return false;
    }
    Session.setUsername(v);
    return true;
  },

  beginPlay() {
    Audio.startMusic();
    Score.reset();
    Player.reset();
    Stage.start(1);
    this.state = 'playing';
    this.hideOverlay();
    overlayControls.style.display = 'none';
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
    nameRowEl.style.display = 'none';
    leaderboardEl.style.display = 'none';
  },

  gameOver() {
    this.state = 'gameover';
    // always submit — fallback to typed-but-unconfirmed name, then "Player"
    const name = (Session.username || (nameInputEl && nameInputEl.value.trim()) || 'Player').slice(0, 16);
    Session.setUsername(name); // persist
    const rank = Leaderboard.submit(name, Score.current, Stage.current, Stage.kills);
    const rankMsg = rank > 0
      ? `이번 기록: <b style="color:#ffd24a">${rank}위</b> — ${Score.current.toLocaleString()}점`
      : `이번 기록: ${Score.current.toLocaleString()}점 (TOP ${Leaderboard.MAX} 진입 실패)`;
    this.showOverlay(
      'GAME OVER', '패 배',
      `Stage ${Stage.current} · ${Stage.kills} kills<br>${rankMsg}`,
      '다 시 시 작'
    );
    Leaderboard.render(name);
    leaderboardEl.style.display = '';
    rankPopupEl.textContent = rank > 0 && rank <= 3 ? `NEW ${rank === 1 ? 'CHAMPION' : 'TOP ' + rank} !` : '';
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
    overlayControls.style.display = 'none';
    nameRowEl.style.display = 'none';
    actionBtn.disabled = false;
  },

  stageClear() {
    this.state = 'stageclear';
    const bonus = Score.addStageBonus(Stage.current);
    this.showOverlay(
      `STAGE ${Stage.current} CLEAR`, '통 과',
      `HP가 회복됩니다. 다음 스테이지는 더 강한 몬스터가 나옵니다.<br>` +
      `클리어 보너스 <b style="color:#ffd24a">+${bonus.toLocaleString()}</b> 점 · 현재 점수 <b>${Score.current.toLocaleString()}</b>`,
      '다 음 스 테 이 지'
    );
    Player.hp = Player.maxHp;
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
    overlayControls.style.display = 'none';
    nameRowEl.style.display = 'none';
    leaderboardEl.style.display = 'none';
    actionBtn.disabled = false;
  },

  onActionButton() {
    if (this.state === 'start') {
      if (!this._ensureUsername()) return;
      this.beginPlay();
    }
    else if (this.state === 'gameover') {
      Stage.current = 1;
      Score.reset();
      Player.reset();
      this.beginPlay();
    } else if (this.state === 'stageclear') {
      Stage.start(Stage.current + 1);
      Player.reset();
      this.state = 'playing';
      this.hideOverlay();
    }
  },

  frame(t) {
    const dt = Math.min(0.033, (t - this.lastT) / 1000 || 0.016);
    this.lastT = t;

    if (this.state === 'playing') {
      Input.update(dt);
      Player.update(dt);
      Enemy.update(dt);
      Effects.update(dt);
      Camera.update();
      updateHUD();
      updateTint();
    }

    Renderer.draw();
    requestAnimationFrame(this.frame.bind(this));
  }
};

actionBtn.addEventListener('click', () => Game.onActionButton());
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !actionBtn.disabled && overlayEl.classList.contains('hidden') === false) {
    // don't submit when typing in name field unless focused
    if (document.activeElement === nameInputEl && Game.state === 'start') {

});

// anywhere outside the input itself, so the click lands on the button.
document.addEventListener('touchstart', (e) => {
  if (document.activeElement === nameInputEl && e.target !== nameInputEl) {
    nameInputEl.blur();
  }
}, { passive: true });
// Also let the start button force-dismiss the keyboard before its own click fires
['touchstart', 'pointerdown'].forEach(evt => {
  actionBtn.addEventListener(evt, () => {
    if (document.activeElement === nameInputEl) nameInputEl.blur();
  }, { passive: true });
});

// -------------------------------------------------------------
// Mobile touch controls — uses Pointer Events for max compatibility
// -------------------------------------------------------------
(function setupTouchControls() {
  const touchEl = document.getElementById('touchControls');
  const isTouchDevice = ('ontouchstart' in window) ||
    (navigator.maxTouchPoints > 0) ||
    (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

  // action -> key used by Input
  const keyMap = {
    left:   'arrowleft',
    right:  'arrowright',
    jump:   ' ',
    attack: 'z'
  };

  function press(action) {
    const k = keyMap[action];
    if (!Input.held[k]) Input.pressed[k] = true;
    if (k === ' ' && !Input.held[k]) Input.jumpBuffer = Config.jumpBufferTime;
    Input.held[k] = true;
    // unlock audio on first user gesture (iOS / mobile browsers)
    try {
      const ac = Audio._ctx();
      if (ac && ac.state === 'suspended') ac.resume();
    } catch (_) {}
  }
  function release(action) {
    const k = keyMap[action];
    Input.held[k] = false;
  }

  // Track which pointerId is bound to which button, so finger-drag works cleanly
  const pointerToBtn = new Map();

  function bindBtn(btn) {
    const action = btn.dataset.action;

    const onStart = (e) => {
      if (e.cancelable) e.preventDefault();
      btn.classList.add('active');
      press(action);
      if (e.pointerId != null) {
        pointerToBtn.set(e.pointerId, { btn, action });
        try { btn.setPointerCapture(e.pointerId); } catch (_) {}
      }
    };
    const onEnd = (e) => {
      if (e.cancelable) e.preventDefault();
      btn.classList.remove('active');
      release(action);
      if (e.pointerId != null) {
        pointerToBtn.delete(e.pointerId);
        try { btn.releasePointerCapture(e.pointerId); } catch (_) {}
      }
    };

    // Pointer Events — unified touch + mouse + pen on all modern browsers
    if (window.PointerEvent) {
      btn.addEventListener('pointerdown',   onStart, { passive: false });
      btn.addEventListener('pointerup',     onEnd,   { passive: false });
      btn.addEventListener('pointercancel', onEnd,   { passive: false });
      btn.addEventListener('pointerleave',  onEnd);
    } else {
      // Fallback for older browsers
      btn.addEventListener('touchstart',  (e) => { if (e.cancelable) e.preventDefault(); btn.classList.add('active');  press(action); },   { passive: false });
      btn.addEventListener('touchend',    (e) => { if (e.cancelable) e.preventDefault(); btn.classList.remove('active'); release(action); }, { passive: false });
      btn.addEventListener('touchcancel', (e) => { if (e.cancelable) e.preventDefault(); btn.classList.remove('active'); release(action); }, { passive: false });
      btn.addEventListener('mousedown',   (e) => { e.preventDefault(); btn.classList.add('active');  press(action); });
      btn.addEventListener('mouseup',     (e) => { e.preventDefault(); btn.classList.remove('active'); release(action); });
      btn.addEventListener('mouseleave',  ()  => { btn.classList.remove('active'); release(action); });
    }

    // long-press context menu off
    btn.addEventListener('contextmenu', e => e.preventDefault());
    // also kill accidental clicks that follow touch (iOS 300ms ghost click)
    btn.addEventListener('click', e => e.preventDefault());
  }

  document.querySelectorAll('#touchControls .touch-btn').forEach(bindBtn);

  // Prevent iOS rubber-band scroll / pinch-zoom inside the game
  document.addEventListener('touchmove', (e) => {
    if (e.target === canvas && e.cancelable) e.preventDefault();
  }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick',     e => e.preventDefault());

  // Show controls only while playing (and on touch-capable devices)
  function updateVisibility() {
    const playing = Game.state === 'playing';
    if (isTouchDevice && playing) touchEl.classList.add('on');
    else                          touchEl.classList.remove('on');
  }
  Game._updateTouchVisibility = updateVisibility;
  updateVisibility();

  // Release held touch keys when leaving play (prevents "stuck key")
  Game._releaseAllTouchKeys = () => {
    Object.values(keyMap).forEach(k => { Input.held[k] = false; });
    document.querySelectorAll('#touchControls .touch-btn.active')
      .forEach(b => b.classList.remove('active'));
    pointerToBtn.clear();
  };

  // Lose focus / tab switch → release all
  window.addEventListener('blur', () => { if (Game._releaseAllTouchKeys) Game._releaseAllTouchKeys(); });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && Game._releaseAllTouchKeys) Game._releaseAllTouchKeys();
  });
})();

// Hook touch-visibility into existing state transitions
(function wireTouchStateHooks() {
  const _begin = Game.beginPlay.bind(Game);
  Game.beginPlay = function () {
    _begin();
    if (Game._updateTouchVisibility) Game._updateTouchVisibility();
  };
  const _over = Game.gameOver.bind(Game);
  Game.gameOver = function () {
    if (Game._releaseAllTouchKeys) Game._releaseAllTouchKeys();
    _over();
    if (Game._updateTouchVisibility) Game._updateTouchVisibility();
  };
  const _clear = Game.stageClear.bind(Game);
  Game.stageClear = function () {
    if (Game._releaseAllTouchKeys) Game._releaseAllTouchKeys();
    _clear();
    if (Game._updateTouchVisibility) Game._updateTouchVisibility();
  };
  const _hide = Game.hideOverlay.bind(Game);
  Game.hideOverlay = function () {
    _hide();
    if (Game._updateTouchVisibility) Game._updateTouchVisibility();
  };
  const _show = Game.showOverlay.bind(Game);
  Game.showOverlay = function (a, b, c, d) {
    _show(a, b, c, d);
    if (Game._updateTouchVisibility) Game._updateTouchVisibility();
  };
})();

// start the render loop (state begins as 'start' — shows menu)
requestAnimationFrame(Game.frame.bind(Game));
</script>
