<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JUNO FLOW</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
  #game { display: block; width: 100vw; height: 100vh; background: #000; }

  /* HUD */
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 2;
    color: #fff; text-shadow: 1px 1px 3px #000;
    font-size: 13px; letter-spacing: 1px;
    pointer-events: none;
  }
  #hudName { color: #ffd24a; font-weight: 700; margin-bottom: 2px; }
  #hpBar {
    width: 220px; height: 16px; background: #222;
    border: 2px solid #fff; border-radius: 3px;
    overflow: hidden; margin-top: 4px;
  }
  #hpFill {
    height: 100%; width: 100%;
    background: linear-gradient(to right, #e04a4a, #ff8a8a);
    transition: width 0.2s;
  }
  #stageInfo { margin-top: 10px; color: #ffd24a; }
  #killCount { font-size: 12px; color: #bbb; margin-top: 4px; }
  #hudScore { font-size: 12px; color: #bbb; margin-top: 4px; }

  /* Proximity tint */
  #tint {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(circle at center, rgba(120,0,0,0) 0%, rgba(80,0,0,0) 100%);
    transition: background 0.3s;
  }

  /* Upload panel */
  #uploadPanel {
    position: fixed; top: 12px; right: 12px; z-index: 2;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 10px 14px; border-radius: 6px; font-size: 12px;
    border: 1px dashed #888;
  }
  #uploadPanel input { display: none; }
  #uploadPanel label { cursor: pointer; color: #ffd24a; }
  #uploadPanel.ok { border-color: #ffd24a; }

  /* Overlay for start / game over / stage clear */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: #fff; z-index: 10; padding: 30px; text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 56px; color: #ffd24a; margin-bottom: 6px;
    letter-spacing: 6px; text-shadow: 3px 3px 0 #5a3a00;
  }
  #overlay .sub { color: #888; letter-spacing: 4px; margin-bottom: 24px; font-size: 13px; }
  #overlay p { color: #bbb; margin: 6px 0; max-width: 500px; line-height: 1.7; }
  #overlay button {
    padding: 14px 38px; font-size: 14px; letter-spacing: 4px;
    background: #1a1a1a; color: #ffd24a; border: 2px solid #ffd24a;
    border-radius: 4px; cursor: pointer; margin-top: 24px;
    transition: all 0.2s; font-family: inherit;
  }
  #overlay button:hover:not([disabled]) { background: #ffd24a; color: #111; }
  #overlay button[disabled] { opacity: 0.3; cursor: not-allowed; }

  kbd {
    background: #333; border: 1px solid #555;
    padding: 2px 6px; border-radius: 3px;
    font-family: monospace; color: #ffd24a;
  }
  .controls {
    display: grid; grid-template-columns: auto auto;
    gap: 6px 18px; margin-top: 18px; font-size: 12px;
    color: #999;
  }
  .controls .k { text-align: right; }
  .controls .v { text-align: left; }

  /* Drop area in start screen */
  #startDrop {
    margin-top: 14px; padding: 16px 28px;
    border: 2px dashed #555; border-radius: 6px;
    color: #999; font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  #startDrop.ok, #startDrop:hover { border-color: #ffd24a; color: #ffd24a; background: rgba(255,210,74,0.04); }
  #startDrop input { display: none; }
  #previewWrap { margin-top: 10px; display: none; }
  #previewWrap.show { display: block; }
  #previewWrap img { max-width: 80px; max-height: 80px; border: 2px solid #ffd24a; border-radius: 4px; }

  /* Flash overlay for damage */
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    background: #fff; opacity: 0; transition: opacity 0.1s;
  }

  /* Name input */
  #nameRow {
    margin-top: 14px; display: flex; align-items: center;
    gap: 10px; color: #bbb; font-size: 13px;
  }
  #nameInput {
    background: #1a1a1a; color: #ffd24a; border: 1px solid #555;
    border-radius: 4px; padding: 8px 12px; font-size: 14px;
    font-family: inherit; letter-spacing: 1px; width: 200px;
    text-align: center;
  }
  #nameInput:focus { outline: none; border-color: #ffd24a; }

  /* Leaderboard (현재 이 파일에서는 점수 전송만, 표시는 별도 랭킹 페이지에서) */
  #leaderboard {
    margin-top: 18px; background: rgba(20,20,20,0.85);
    border: 1px solid #333; border-radius: 6px;
    padding: 14px 18px; min-width: 360px; max-width: 420px;
  }
  #leaderboard h3 {
    color: #ffd24a; font-size: 13px; letter-spacing: 4px;
    margin-bottom: 10px; text-align: center;
  }
  #leaderboard table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    color: #ccc;
  }
  #leaderboard th {
    color: #888; font-weight: 500; text-align: left;
    padding: 4px 6px; border-bottom: 1px solid #333;
    letter-spacing: 1px;
  }
  #leaderboard td {
    padding: 4px 6px; border-bottom: 1px solid #222;
  }
  #leaderboard tr.you td { color: #ffd24a; background: rgba(255,210,74,0.05); }
  #leaderboard tr.top1 td .rank { color: #ffd24a; font-weight: 700; }
  #leaderboard tr.top2 td .rank { color: #d0d0d0; }
  #leaderboard tr.top3 td .rank { color: #c09060; }
  #leaderboard .empty { color: #555; text-align: center; padding: 16px; font-style: italic; }
  #leaderboard .right { text-align: right; }

  #rankPopup {
    margin-top: 10px; color: #ffd24a; font-size: 14px; letter-spacing: 2px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="tint"></div>
<div id="flash"></div>

<div id="hud" style="display:none">
  <div id="hudName">PLAYER: -</div>
  <div>HP</div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="stageInfo">STAGE 1</div>
  <div id="killCount">Kills: 0 / 5</div>
  <div id="hudScore">SCORE: 0</div>
  <div style="margin-top:10px; font-size:11px; color:#999">
    <kbd>←</kbd> <kbd>→</kbd> · <kbd>Space</kbd> 점프 · <kbd>Z</kbd> 공격
  </div>
</div>

<div id="uploadPanel" style="display:none">
  <div>몬스터 이미지</div>
  <label for="monsterFile">클릭해서 변경</label>
  <input type="file" id="monsterFile" accept="image/*">
</div>

<!-- Start / Game-over / Victory overlay -->
<div id="overlay">
  <h1 id="overlayTitle">JUNO FLOW</h1>
  <div class="sub" id="overlaySub">A CREEPY PLATFORMER</div>
  <p id="overlayBody">
    모든 몬스터를 처치하고 다음 스테이지로 진행하세요.<br>
    너무 오래 바라보면 그것은 더 빨라집니다.
  </p>
  <div class="controls" id="overlayControls">
    <div class="k"><kbd>←</kbd> <kbd>→</kbd></div><div class="v">이동</div>
    <div class="k"><kbd>Space</kbd></div><div class="v">점프 (꾹 누르면 높이 점프)</div>
    <div class="k"><kbd>Z</kbd></div><div class="v">공격</div>
  </div>

  <label id="startDrop">
    <div style="color:#ffd24a; font-weight:700">(선택) 나만의 몬스터 이미지 사용</div>
    <div>클릭 / 드래그 / Ctrl+V 붙여넣기 — 안 올리면 기본 몬스터로 진행</div>
    <input type="file" id="startFile" accept="image/*">
  </label>
  <div id="previewWrap"><img id="preview" alt="preview"></div>

  <!-- 닉네임 입력 -->
  <div id="nameRow">
    <span>닉네임</span>
    <input id="nameInput" type="text" maxlength="16" placeholder="예: shadow-juno" />
  </div>

  <button id="actionBtn" disabled>모 험 시 작</button>
</div>

<script>
/* =============================================================
   CREEPY PLATFORMER + RANK SUBMIT
   ============================================================= */

// -------------------------------------------------------------
// Canvas
// -------------------------------------------------------------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize); resize();

// -------------------------------------------------------------
// Config
// -------------------------------------------------------------
const Config = {
  gravity: 0.6,
  moveSpeed: 5.2,
  jumpInitial: 9,
  jumpHoldBoost: 0.55,
  jumpMaxHoldTime: 0.28,
  coyoteTime: 0.1,
  jumpBufferTime: 0.12,
  playerMaxHP: 100,
  attackDuration: 0.18,
  attackCooldown: 0.28,
  attackReach: 70,
  attackDamage: 25,
  enemyContactDamage: 10,
  enemyContactCooldown: 0.9,
  worldWidth: 3600,
  tileSize: 32,
};

// 랭킹 서버 설정
const STORAGE_USER_KEY = 'junoFlowUsername';
// Next.js 랭킹 서버가 다른 도메인에 있다면 여기 채워주세요. 예: 'https://juno-flow-ranking.vercel.app'
const RANK_API_BASE = '';

function apiUrl(path) {
  if (!RANK_API_BASE) return path;
  return RANK_API_BASE.replace(/\/$/, '') + path;
}

// -------------------------------------------------------------
// Input — with edge detect + jump buffer
// -------------------------------------------------------------
const Input = {
  held: {},
  pressed: {},
  jumpBuffer: 0,
  init() {
    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if ([' ','arrowleft','arrowright','arrowup','arrowdown','z'].includes(k)) e.preventDefault();
      if (!this.held[k]) this.pressed[k] = true;
      if (k === ' ' && !this.held[k]) this.jumpBuffer = Config.jumpBufferTime;
      this.held[k] = true;
    });
    window.addEventListener('keyup', e => { this.held[e.key.toLowerCase()] = false; });
  },
  update(dt) { if (this.jumpBuffer > 0) this.jumpBuffer -= dt; },
  down(k)     { return !!this.held[k.toLowerCase()]; },
  tap(k)      { const v = this.pressed[k.toLowerCase()]; this.pressed[k.toLowerCase()] = false; return !!v; },
  consumeJump() { if (this.jumpBuffer > 0) { this.jumpBuffer = 0; return true; } return false; }
};
Input.init();

// -------------------------------------------------------------
// Audio — music loop + sfx (Web Audio synthesized)
// -------------------------------------------------------------
const Audio = {
  ctx: null,
  musicStarted: false,
  _music: null,
  _ctx() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); return this.ctx; },

  sfx(freq, dur, type = 'square', vol = 0.1) {
    const c = this._ctx(); const now = c.currentTime;
    const o = c.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(c.destination);
    o.start(now); o.stop(now + dur + 0.02);
  },
  jump()   { this.sfx(560, 0.08, 'square', 0.06); this.sfx(720, 0.08, 'square', 0.05); },
  attack() { this.sfx(220, 0.07, 'sawtooth', 0.08); },
  hit()    { this.sfx(900, 0.05, 'square', 0.12); this.sfx(300, 0.09, 'square', 0.08); },
  hurt()   { this.sfx(140, 0.2, 'sawtooth', 0.18); },
  die()    {
    this.sfx(200, 0.14, 'sawtooth', 0.15);
    setTimeout(() => this.sfx(120, 0.2, 'sawtooth', 0.12), 80);
    setTimeout(() => this.sfx(80, 0.35, 'sawtooth', 0.1), 160);
  },
  stare()  { this.sfx(1100, 0.05, 'sine', 0.06); },

  startMusic() {
    if (this.musicStarted) return;
    this.musicStarted = true;
    const c = this._ctx();
    const drone = c.createOscillator(); drone.type = 'sawtooth'; drone.frequency.value = 55;
    const df = c.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 180;
    const dg = c.createGain(); dg.gain.value = 0.04;
    drone.connect(df); df.connect(dg); dg.connect(c.destination);
    drone.start();

    const bs = 2 * c.sampleRate;
    const nb = c.createBuffer(1, bs, c.sampleRate);
    const d = nb.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
    const ns = c.createBufferSource(); ns.buffer = nb; ns.loop = true;
    const nf = c.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 400; nf.Q.value = 0.8;
    const ng = c.createGain(); ng.gain.value = 0.03;
    ns.connect(nf); nf.connect(ng); ng.connect(c.destination);
    ns.start();

    const eerieNotes = [220, 165, 277, 185, 146];
    let i = 0;
    const eerieLoop = () => {
      if (!this.musicStarted) return;
      const n = eerieNotes[i % eerieNotes.length]; i++;
      const now = c.currentTime;
      const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = n;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.04, now + 0.5);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(now); o.stop(now + 3.3);
      setTimeout(eerieLoop, 4500 + Math.random() * 3000);
    };
    setTimeout(eerieLoop, 2000);
  }
};

// -------------------------------------------------------------
// Camera — with shake
// -------------------------------------------------------------
const Camera = {
  x: 0, y: 0, shake: 0,
  update() {
    const target = Player.x + Player.w / 2 - W / 2;
    this.x += (target - this.x) * 0.14;
    this.x = Math.max(0, Math.min(Config.worldWidth - W, this.x));
    this.shake *= 0.82;
  },
  shakeNow(amt) { this.shake = Math.max(this.shake, amt); },
  offsetX() { return (Math.random() - 0.5) * this.shake; },
  offsetY() { return (Math.random() - 0.5) * this.shake; }
};

// -------------------------------------------------------------
// Effects — flash overlay, particles, damage numbers
// -------------------------------------------------------------
const Effects = {
  particles: [],
  dmgNums: [],

  hitFlash(intensity = 0.4) {
    const el = document.getElementById('flash');
    el.style.opacity = intensity;
    setTimeout(() => { el.style.opacity = '0'; }, 80);
  },
  spawnBurst(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 6,
        vy: -2 - Math.random() * 4,
        life: 1,
        color
      });
    }
  },
  spawnDamageNum(x, y, text, crit = false) {
    this.dmgNums.push({ x, y, text, crit, life: 1 });
  },
  update(dt) {
    for (const p of this.particles) {
      p.vy += 0.35; p.x += p.vx; p.y += p.vy; p.life -= dt * 1.5;
    }
    this.particles = this.particles.filter(p => p.life > 0);
    for (const d of this.dmgNums) { d.y -= 40 * dt; d.life -= dt * 1.3; }
    this.dmgNums = this.dmgNums.filter(d => d.life > 0);
  },
  draw() {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - Camera.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
    for (const d of this.dmgNums) {
      ctx.globalAlpha = d.life;
      ctx.font = `bold ${d.crit ? 22 : 16}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
      ctx.strokeText(d.text, d.x - Camera.x, d.y);
      ctx.fillStyle = d.crit ? '#ffe64a' : '#fff';
      ctx.fillText(d.text, d.x - Camera.x, d.y);
    }
    ctx.globalAlpha = 1;
  }
};

// -------------------------------------------------------------
// Level — multi-height platforms
// -------------------------------------------------------------
const Level = {
  groundY: 540,
  platforms: [
    { x: 0,    y: 540, w: 800,  h: 80 },
    { x: 900,  y: 540, w: 500,  h: 80 },
    { x: 1500, y: 540, w: 600,  h: 80 },
    { x: 2200, y: 540, w: 1400, h: 80 },
    { x: 250,  y: 420, w: 160, h: 14 },
    { x: 500,  y: 330, w: 160, h: 14 },
    { x: 750,  y: 240, w: 160, h: 14 },
    { x: 1000, y: 400, w: 160, h: 14 },
    { x: 1250, y: 320, w: 180, h: 14 },
    { x: 1600, y: 440, w: 180, h: 14 },
    { x: 1850, y: 360, w: 180, h: 14 },
    { x: 2100, y: 280, w: 180, h: 14 },
    { x: 2400, y: 380, w: 180, h: 14 },
    { x: 2650, y: 300, w: 180, h: 14 },
    { x: 2950, y: 420, w: 180, h: 14 },
    { x: 3200, y: 340, w: 180, h: 14 },
  ]
};

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// -------------------------------------------------------------
// Player
// -------------------------------------------------------------
const Player = {
  x: 80, y: 400, w: 32, h: 48,
  vx: 0, vy: 0,
  facing: 1,
  onGround: false,
  coyote: 0,
  jumpHold: 0,
  hp: Config.playerMaxHP,
  maxHp: Config.playerMaxHP,
  invuln: 0,
  attackTimer: 0,
  attackCooldown: 0,
  animT: 0,
  hitFlash: 0,

  reset() {
    this.x = 80; this.y = 400;
    this.vx = 0; this.vy = 0;
    this.hp = this.maxHp;
    this.invuln = 0;
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.coyote = 0; this.jumpHold = 0;
  },

  update(dt) {
    this.animT += dt;
    if (this.invuln > 0) this.invuln -= dt;
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.attackTimer > 0) this.attackTimer -= dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;

    this.vx = 0;
    if (Input.down('arrowleft'))  { this.vx = -Config.moveSpeed; this.facing = -1; }
    if (Input.down('arrowright')) { this.vx = +Config.moveSpeed; this.facing = +1; }

    if (this.onGround) this.coyote = Config.coyoteTime;
    else this.coyote -= dt;

    if (Input.consumeJump() && this.coyote > 0) {
      this.vy = -Config.jumpInitial;
      this.jumpHold = Config.jumpMaxHoldTime;
      this.onGround = false;
      this.coyote = 0;
      Audio.jump();
    }
    if (Input.down(' ') && this.jumpHold > 0 && this.vy < 0) {
      this.vy -= Config.jumpHoldBoost;
      this.jumpHold -= dt;
    } else {
      this.jumpHold = 0;
    }

    if (Input.tap('z') && this.attackCooldown <= 0) {
      this.attackTimer = Config.attackDuration;
      this.attackCooldown = Config.attackCooldown;
      Audio.attack();
      Combat.performAttack();
    }

    this.vy += Config.gravity;
    if (this.vy > 17) this.vy = 17;

    this.x += this.vx;
    this.x = Math.max(0, Math.min(Config.worldWidth - this.w, this.x));

    this.y += this.vy;
    this.onGround = false;
    for (const p of Level.platforms) {
      if (this.vy >= 0 &&
          this.x + this.w > p.x && this.x < p.x + p.w &&
          this.y + this.h >= p.y && this.y + this.h <= p.y + Math.max(20, p.h)) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.onGround = true;
      }
    }

    if (this.y > H + 100) this.hit(30);
  },

  hit(dmg, fromX) {
    if (this.invuln > 0) return;
    this.hp = Math.max(0, this.hp - dmg);
    this.invuln = Config.enemyContactCooldown;
    this.hitFlash = 0.25;
    if (fromX !== undefined) this.vx = this.x < fromX ? -7 : 7;
    this.vy = -6;
    Audio.hurt();
    Effects.hitFlash(0.45);
    Camera.shakeNow(10);
    Effects.spawnDamageNum(this.x + this.w / 2, this.y - 10, dmg);
    if (this.hp <= 0) Game.gameOver();
  },

  attackBox() {
    const ax = this.facing > 0 ? this.x + this.w : this.x - Config.attackReach;
    return { x: ax, y: this.y + 6, w: Config.attackReach, h: this.h - 12 };
  },

  draw() {
    const sx = this.x - Camera.x + Camera.offsetX();
    const sy = this.y + Camera.offsetY();
    if (this.invuln > 0 && Math.floor(this.invuln * 20) % 2 === 0) return;
    if (this.hitFlash > 0) ctx.filter = 'brightness(2.5)';

    ctx.fillStyle = '#2a3a5a';
    const walking = Math.abs(this.vx) > 0.1 && this.onGround;
    const swing = walking ? Math.sin(this.animT * 16) * 3 : 0;
    ctx.fillRect(sx + 6, sy + 30, 8, 18 - swing);
    ctx.fillRect(sx + 18, sy + 30, 8, 18 + swing);
    ctx.fillStyle = '#4288dd';
    ctx.fillRect(sx + 4, sy + 14, 24, 20);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(sx + 4, sy + 30, 24, 3);
    ctx.fillStyle = '#f2c69a';
    ctx.fillRect(sx + 6, sy, 20, 16);
    ctx.fillStyle = '#3a2412';
    ctx.fillRect(sx + 4, sy, 24, 6);
    ctx.fillStyle = '#000';
    const ex = this.facing > 0 ? sx + 18 : sx + 8;
    ctx.fillRect(ex, sy + 8, 3, 3);

    if (this.attackTimer > 0) {
      const box = this.attackBox();
      ctx.fillStyle = 'rgba(255,220,120,0.5)';
      ctx.fillRect(box.x - Camera.x, box.y, box.w, box.h);
      ctx.fillStyle = '#e0e4ee';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 18, 46, 6);
      else ctx.fillRect(sx - 46, sy + 18, 46, 6);
      ctx.fillStyle = '#8e9ab0';
      if (this.facing > 0) ctx.fillRect(sx + this.w, sy + 20, 46, 2);
      else ctx.fillRect(sx - 46, sy + 20, 46, 2);
    } else {
      ctx.fillStyle = '#f2c69a';
      if (this.facing > 0) ctx.fillRect(sx + 24, sy + 18, 5, 12);
      else ctx.fillRect(sx + 3, sy + 18, 5, 12);
    }

    ctx.filter = 'none';
  }
};

// -------------------------------------------------------------
// Enemy, Combat, Stage, Renderer (원본 그대로) + 점수 상승 부분만 추가
// -------------------------------------------------------------
const Enemy = {
  image: null,
  imageKeyed: null,
  imageReady: false,
  useDefault: true,

  list: [],

  setImage(img) {
    this.useDefault = false;
    this.image = img;
    this.imageReady = true;
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    const cc = c.getContext('2d');
    cc.drawImage(img, 0, 0);
    try {
      const id = cc.getImageData(0, 0, c.width, c.height);
      const d = id.data;
      const bR = d[0], bG = d[1], bB = d[2];
      for (let i = 0; i < d.length; i += 4) {
        const dist = Math.hypot(d[i] - bR, d[i+1] - bG, d[i+2] - bB);
        const isCyan = d[i+2] > 140 && d[i+1] > 130 && d[i] < 210 && d[i+2] > d[i] + 20;
        if (dist < 40 || (isCyan && dist < 110)) d[i+3] = 0;
        else if (dist < 75) d[i+3] = Math.floor(((dist - 40) / 35) * 255);
      }
      cc.putImageData(id, 0, 0);
      const out = new Image(); out.src = c.toDataURL('image/png');
      this.imageKeyed = out;
    } catch (e) {}
  },

  spawn(x, y, hpMult = 1) {
    this.list.push({
      x, y, w: 48, h: 64,
      vx: 0, vy: 0,
      hp: Math.floor(40 * hpMult),
      maxHp: Math.floor(40 * hpMult),
      facing: -1,
      onGround: false,
      bob: Math.random() * 6,
      ai: 'PATROL',
      aiTimer: 1 + Math.random() * 2,
      patrolDir: Math.random() < 0.5 ? -1 : 1,
      aggression: 0,
      starePose: 0,
      speedBoost: 0,
      hitFlash: 0,
      dying: false,
      dyingT: 0,
      justHitCooldown: 0,
    });
  },

  allDead() { return this.list.every(e => e.dying || e.hp <= 0); },

  update(dt) {
    for (const e of this.list) {
      e.bob += dt;
      if (e.hitFlash > 0) e.hitFlash -= dt;
      if (e.justHitCooldown > 0) e.justHitCooldown -= dt;

      if (e.dying) {
        e.dyingT += dt;
        e.vy += Config.gravity * 0.6;
        e.y += e.vy;
        e.x += e.vx * 0.5;
        e.vx *= 0.94;
        continue;
      }

      const dx = (Player.x + Player.w / 2) - (e.x + e.w / 2);
      const dy = (Player.y + Player.h / 2) - (e.y + e.h / 2);
      const dist = Math.hypot(dx, dy);

      const onScreen = (e.x + e.w > Camera.x && e.x < Camera.x + W);
      const lookingAt = onScreen && dist < 600 &&
        ((Player.facing > 0 && dx > 0) || (Player.facing < 0 && dx < 0));

      if (lookingAt) e.aggression = Math.min(1, e.aggression + dt * 0.2);
      else e.aggression = Math.max(0, e.aggression - dt * 0.08);

      e.aiTimer -= dt;
      const farDist = 280;
      const closeDist = 150;

      if (e.ai === 'PATROL' && e.aiTimer <= 0 && Math.random() < 0.3) {
        e.ai = 'STARE';
        e.aiTimer = 0.8 + Math.random() * 1.0;
        Audio.stare();
      }

      if (e.ai === 'STARE') {
        e.vx = 0;
        e.facing = dx < 0 ? -1 : 1;
        e.starePose = 1;
        if (e.aiTimer <= 0) {
          e.ai = dist < farDist ? 'CHASE' : 'PATROL';
          e.aiTimer = 1.5 + Math.random() * 2;
        }
      } else if (dist < farDist) {
        e.ai = 'CHASE';
        const baseSpeed = 1.6 + e.aggression * 2.5;
        if (dist < closeDist && e.speedBoost <= 0 && Math.random() < 0.02) {
          e.speedBoost = 0.4;
          Audio.stare();
        }
        if (e.speedBoost > 0) { e.speedBoost -= dt; }
        const speed = baseSpeed + (e.speedBoost > 0 ? 3 : 0);
        e.vx = Math.sign(dx) * speed;
        e.facing = e.vx < 0 ? -1 : 1;
      } else {
        e.ai = 'PATROL';
        e.vx = e.patrolDir * 1.4;
        e.facing = e.patrolDir;
        if (e.aiTimer <= 0) {
          e.patrolDir *= -1;
          e.aiTimer = 2 + Math.random() * 3;
        }
      }

      e.vy += Config.gravity;
      if (e.vy > 16) e.vy = 16;
      e.x += e.vx;
      e.x = Math.max(0, Math.min(Config.worldWidth - e.w, e.x));
      e.y += e.vy;
      e.onGround = false;
      let platformUnder = null;
      for (const p of Level.platforms) {
        if (e.vy >= 0 &&
            e.x + e.w > p.x && e.x < p.x + p.w &&
            e.y + e.h >= p.y && e.y + e.h <= p.y + Math.max(20, p.h)) {
          e.y = p.y - e.h;
          e.vy = 0;
          e.onGround = true;
          platformUnder = p;
        }
      }
      if (e.ai === 'PATROL' && platformUnder) {
        if (e.x < platformUnder.x + 4) { e.patrolDir = 1; }
        if (e.x + e.w > platformUnder.x + platformUnder.w - 4) { e.patrolDir = -1; }
      }

      if (e.justHitCooldown <= 0 && rectsOverlap(e, Player)) {
        Player.hit(Config.enemyContactDamage, e.x + e.w / 2);
        e.justHitCooldown = 0.4;
      }
    }

    this.list = this.list.filter(e => !(e.dying && e.dyingT > 1.2));
  },

  damage(e, dmg, fromFacing) {
    e.hp -= dmg;
    e.hitFlash = 0.15;
    e.x += fromFacing * 18;
    Audio.hit();
    Camera.shakeNow(5);
    const crit = Math.random() < 0.18;
    Effects.spawnDamageNum(e.x + e.w / 2, e.y, crit ? Math.floor(dmg * 1.5) : dmg, crit);
    if (e.hp <= 0 && !e.dying) {
      e.dying = true;
      e.dyingT = 0;
      e.vy = -6;
      e.vx = fromFacing * 3;
      Audio.die();
      Effects.spawnBurst(e.x + e.w / 2, e.y + e.h / 2, '#e8c547', 14);
      Stage.onEnemyKilled();
    }
  },

  draw() {
    for (const e of this.list) {
      const sx = e.x - Camera.x + Camera.offsetX();
      const sy = e.y + Camera.offsetY();
      if (sx + e.w < -20 || sx > W + 20) continue;
      const bob = Math.sin(e.bob * 3) * 2;
      const shake = (e.ai === 'STARE' || e.aggression > 0.5) ? (Math.random() - 0.5) * 1.5 : 0;

      ctx.save();
      if (e.dying) ctx.globalAlpha = Math.max(0, 1 - e.dyingT / 1.2);
      if (e.hitFlash > 0) ctx.filter = 'brightness(2.5)';

      if (e.aggression > 0.4) {
        const aura = ctx.createRadialGradient(
          sx + e.w / 2, sy + e.h / 2, 10,
          sx + e.w / 2, sy + e.h / 2, e.w * 1.3
        );
        aura.addColorStop(0, `rgba(180,0,0,${0.2 * e.aggression})`);
        aura.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = aura;
        ctx.fillRect(sx - e.w, sy - e.h, e.w * 3, e.h * 3);
      }

      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(sx + e.w / 2, sy + e.h, e.w * 0.45, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      if (this.imageReady && !this.useDefault) {
        const src = this.imageKeyed && this.imageKeyed.complete ? this.imageKeyed : this.image;
        ctx.translate(sx + e.w / 2 + shake, sy + bob + shake);
        ctx.scale(e.facing < 0 ? -1 : 1, 1);
        if (e.dying) ctx.rotate((e.facing < 0 ? 1 : -1) * e.dyingT * 1.5);
        const ar = src.width / src.height;
        const h = e.h;
        const w = h * ar;
        ctx.drawImage(src, -w / 2, 0, w, h);
      } else {
        ctx.translate(sx + e.w / 2 + shake, sy + bob + shake);
        ctx.scale(e.facing < 0 ? -1 : 1, 1);
        if (e.dying) ctx.rotate((e.facing < 0 ? 1 : -1) * e.dyingT * 1.5);
        drawDefaultMonster(e);
      }

      ctx.restore();
      ctx.filter = 'none';
      ctx.globalAlpha = 1;

      if (!e.dying && e.hp < e.maxHp) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(sx, sy - 8, e.w, 4);
        ctx.fillStyle = '#ff5050';
        ctx.fillRect(sx + 1, sy - 7, (e.w - 2) * (e.hp / e.maxHp), 2);
      }
    }
  }
};

const Combat = {
  performAttack() {
    const box = Player.attackBox();
    for (const e of Enemy.list) {
      if (e.dying) continue;
      if (rectsOverlap(box, e)) {
        const crit = Math.random() < 0.2;
        Enemy.damage(e, crit ? Math.floor(Config.attackDamage * 1.5) : Config.attackDamage, Player.facing);
      }
    }
  }
};

// 런 점수
let runScore = 0;

const Stage = {
  current: 1,
  targetKills: 5,
  kills: 0,
  hpMult: 1,

  start(n) {
    this.current = n;
    this.hpMult = 1 + (n - 1) * 0.35;
    this.targetKills = 4 + n;
    this.kills = 0;
    Enemy.list.length = 0;
    const positions = [
      [500, 420], [800, 420], [1200, 420], [1600, 420],
      [2000, 420], [2400, 420], [2800, 420], [3200, 420],
      [520, 300], [1020, 380], [1870, 340], [2420, 360],
    ];
    const numSpawn = Math.min(positions.length, this.targetKills + 2);
    for (let i = 0; i < numSpawn; i++) {
      Enemy.spawn(positions[i][0], positions[i][1], this.hpMult);
    }
    updateHUD();
    updateScoreHUD();
  },
  onEnemyKilled() {
    this.kills++;
    runScore += 100; // 킬당 100점
    updateHUD();
    updateScoreHUD();
    if (this.kills >= this.targetKills) {
      setTimeout(() => Game.stageClear(), 800);
    }
  }
};

const Renderer = {
  draw() {
    const nightAmt = Math.min(1, (Stage.current - 1) * 0.25);
    const topC = lerpColor('#7ec8e8', '#1a1830', nightAmt);
    const botC = lerpColor('#c7e8c0', '#2a2530', nightAmt);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, topC);
    g.addColorStop(1, botC);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    if (nightAmt > 0.2) {
      ctx.fillStyle = `rgba(255,255,220,${nightAmt})`;
      ctx.beginPath(); ctx.arc(W - 140, 100, 36, 0, Math.PI * 2); ctx.fill();
    }

    ctx.fillStyle = lerpColor('#8fb08a', '#2a3a2a', nightAmt);
    const par1 = Camera.x * 0.15;
    for (let i = -1; i < Math.ceil(W / 400) + 2; i++) {
      const hx = i * 400 - (par1 % 400);
      ctx.beginPath();
      ctx.moveTo(hx, H);
      ctx.quadraticCurveTo(hx + 200, H - 240, hx + 400, H);
      ctx.fill();
    }

    ctx.fillStyle = lerpColor('#6f9a6b', '#1c2a1c', nightAmt);
    const par2 = Camera.x * 0.3;
    for (let i = -1; i < Math.ceil(W / 280) + 2; i++) {
      const hx = i * 280 - (par2 % 280);
      ctx.beginPath();
      ctx.moveTo(hx, H);
      ctx.quadraticCurveTo(hx + 140, H - 180, hx + 280, H);
      ctx.fill();
    }

    ctx.fillStyle = `rgba(255,255,255,${0.8 - nightAmt * 0.6})`;
    const par3 = Camera.x * 0.08;
    for (let i = 0; i < 10; i++) {
      const x = ((i * 400 - par3) % (W + 400)) - 100;
      const y = 50 + (i * 41) % 120;
      drawCloud(x, y, 28 + (i * 7) % 22);
    }

    for (const p of Level.platforms) {
      const sx = p.x - Camera.x + Camera.offsetX();
      const sy = p.y + Camera.offsetY();
      if (sx + p.w < 0 || sx > W) continue;
      ctx.fillStyle = lerpColor('#6ac46a', '#2e4a2e', nightAmt);
      ctx.fillRect(sx, sy, p.w, 6);
      ctx.fillStyle = lerpColor('#8b5a2b', '#3a2816', nightAmt);
      ctx.fillRect(sx, sy + 6, p.w, p.h - 6);
      ctx.fillStyle = lerpColor('#4ea04e', '#1a2a1a', nightAmt);
      for (let i = 8; i < p.w - 8; i += 24) {
        ctx.fillRect(sx + i, sy - 3, 2, 4);
        ctx.fillRect(sx + i + 2, sy - 2, 2, 3);
      }
    }

    Enemy.draw();
    Player.draw();
    Effects.draw();
  }
};

function drawDefaultMonster(e) {
  const w = e.w, h = e.h;
  const agg = e.aggression || 0;
  const robeGrad = ctx.createLinearGradient(0, 0, 0, h);
  robeGrad.addColorStop(0, '#2a2432');
  robeGrad.addColorStop(1, '#0e0c14');
  ctx.fillStyle = robeGrad;
  ctx.beginPath();
  ctx.moveTo(-w * 0.35, h * 0.45);
  ctx.lineTo(-w * 0.5, h);
  ctx.lineTo(-w * 0.35, h * 0.95);
  ctx.lineTo(-w * 0.2, h);
  ctx.lineTo(-w * 0.05, h * 0.95);
  ctx.lineTo(w * 0.1, h);
  ctx.lineTo(w * 0.3, h * 0.95);
  ctx.lineTo(w * 0.5, h);
  ctx.lineTo(w * 0.35, h * 0.45);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#d8cfae';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-w * 0.3, h * 0.5);
  ctx.quadraticCurveTo(-w * 0.55, h * 0.65, -w * 0.45, h * 0.85);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(w * 0.3, h * 0.5);
  const reach = 0.55 + agg * 0.25;
  ctx.quadraticCurveTo(w * reach, h * 0.55, w * (reach + 0.1), h * (0.75 - agg * 0.15));
  ctx.stroke();
  ctx.lineWidth = 2;
  const hx = w * (reach + 0.1), hy = h * (0.75 - agg * 0.15);
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx + (2 + i) * 1.5, hy + (i - 1) * 3 + 4);
    ctx.stroke();
  }

  ctx.fillStyle = '#d8cfae';
  ctx.fillRect(-w * 0.08, h * 0.3, w * 0.16, h * 0.12);

  const headGrad = ctx.createRadialGradient(-w * 0.1, h * 0.12, w * 0.05, 0, h * 0.2, w * 0.5);
  headGrad.addColorStop(0, '#ece3c2');
  headGrad.addColorStop(0.7, '#c2b896');
  headGrad.addColorStop(1, '#7a6e52');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.2, w * 0.32, h * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(-w * 0.12, h * 0.18, w * 0.08, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.12, h * 0.18, w * 0.08, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  const glow = agg > 0.3 ? `rgba(255,${Math.floor(80 - agg * 60)},${Math.floor(80 - agg * 70)},1)` : '#3a2a2a';
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(-w * 0.12, h * 0.19, w * 0.025, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w * 0.12, h * 0.19, w * 0.025, 0, Math.PI * 2);
  ctx.fill();

  const smileW = w * (0.22 + agg * 0.08);
  const smileY = h * 0.28;
  ctx.strokeStyle = '#2a1010';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-smileW, smileY);
  ctx.quadraticCurveTo(0, smileY + h * (0.06 + agg * 0.04), smileW, smileY);
  ctx.stroke();
  ctx.fillStyle = '#100808';
  ctx.beginPath();
  ctx.moveTo(-smileW + 1, smileY + 1);
  ctx.quadraticCurveTo(0, smileY + h * (0.06 + agg * 0.04), smileW - 1, smileY + 1);
  ctx.quadraticCurveTo(0, smileY + h * (0.03 + agg * 0.03), -smileW + 1, smileY + 1);
  ctx.fill();
  ctx.fillStyle = '#e8e2c8';
  const teethN = 5;
  for (let i = 0; i < teethN; i++) {
    const tx = -smileW + (i + 0.5) * (smileW * 2 / teethN);
    const th = 2 + (i % 2) * 2;
    ctx.fillRect(tx - 1, smileY + 1, 2, th);
  }

  ctx.fillStyle = '#1a1420';
  ctx.beginPath();
  ctx.moveTo(-w * 0.3, h * 0.08);
  ctx.quadraticCurveTo(-w * 0.2, -h * 0.05, 0, -h * 0.03);
  ctx.quadraticCurveTo(w * 0.2, -h * 0.05, w * 0.3, h * 0.08);
  ctx.quadraticCurveTo(w * 0.15, h * 0.02, 0, h * 0.04);
  ctx.quadraticCurveTo(-w * 0.15, h * 0.02, -w * 0.3, h * 0.08);
  ctx.fill();
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * w * 0.07, h * 0.02);
    ctx.lineTo(i * w * 0.07 + (Math.random() - 0.5) * 3, -h * 0.08 - Math.abs(i) * 2);
    ctx.strokeStyle = '#1a1420';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y + r * 0.2, r * 0.75, 0, Math.PI * 2);
  ctx.arc(x - r * 0.7, y + r * 0.1, r * 0.65, 0, Math.PI * 2);
  ctx.fill();
}

function lerpColor(c1, c2, t) {
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  const r = Math.floor(p1.r + (p2.r - p1.r) * t);
  const g = Math.floor(p1.g + (p2.g - p1.g) * t);
  const b = Math.floor(p1.b + (p2.b - p1.b) * t);
  return `rgb(${r},${g},${b})`;
}
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

const hudEl = document.getElementById('hud');
const hpFillEl = document.getElementById('hpFill');
const stageInfoEl = document.getElementById('stageInfo');
const killCountEl = document.getElementById('killCount');
const hudNameEl = document.getElementById('hudName');
const hudScoreEl = document.getElementById('hudScore');
const tintEl = document.getElementById('tint');
const overlayEl = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const overlayBody = document.getElementById('overlayBody');
const overlayControls = document.getElementById('overlayControls');

const startFile = document.getElementById('startFile');
const preview = document.getElementById('preview');
const previewWrap = document.getElementById('previewWrap');
const uploadPanel = document.getElementById('uploadPanel');
const monsterFile = document.getElementById('monsterFile');
const nameInputEl = document.getElementById('nameInput');

let playerName = '';

function updateHUD() {
  hpFillEl.style.width = (Player.hp / Player.maxHp * 100) + '%';
  stageInfoEl.textContent = `STAGE ${Stage.current}`;
  killCountEl.textContent = `Kills: ${Stage.kills} / ${Stage.targetKills}`;
}

function updateScoreHUD() {
  if (hudScoreEl) hudScoreEl.textContent = 'SCORE: ' + runScore;
}

function updateTint() {
  let minDist = Infinity;
  for (const e of Enemy.list) {
    if (e.dying) continue;
    const dx = Player.x - e.x;
    const dy = Player.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < minDist) minDist = d;
  }
  const prox = Math.max(0, Math.min(1, 1 - minDist / 400));
  tintEl.style.background = `radial-gradient(circle at center, rgba(0,0,0,0) 30%, rgba(80,0,0,${prox * 0.45}) 100%)`;
}

function loadPlayerNameFromStorage() {
  try {
    const saved = window.localStorage.getItem(STORAGE_USER_KEY);
    if (saved && saved.trim()) {
      playerName = saved.trim();
      if (nameInputEl) nameInputEl.value = playerName;
      if (hudNameEl) hudNameEl.textContent = 'PLAYER: ' + playerName;
      return true;
    }
  } catch (e) {}
  return false;
}

function ensurePlayerName() {
  if (playerName && playerName.trim()) return true;
  const v = (nameInputEl && nameInputEl.value ? nameInputEl.value : '').trim();
  if (!v) return false;
  playerName = v;
  try { window.localStorage.setItem(STORAGE_USER_KEY, playerName); } catch (e) {}
  if (hudNameEl) hudNameEl.textContent = 'PLAYER: ' + playerName;
  return true;
}

function submitScoreToServer(finalScore) {
  if (!ensurePlayerName()) return;
  if (!Number.isFinite(finalScore) || finalScore <= 0) return;

  const payload = { playerName, score: finalScore };
  fetch(apiUrl('/api/rank'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).catch(() => {
    // 네트워크 에러는 조용히 무시
  });
}

// -------------------------------------------------------------
// Image upload (start & HUD)
// -------------------------------------------------------------
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      Enemy.setImage(img);
      preview.src = e.target.result;
      previewWrap.classList.add('show');
      startDrop.classList.add('ok');
      uploadPanel.classList.add('ok');
      actionBtn.disabled = !nameInputEl.value.trim();
      startDrop.querySelector('div:first-child').textContent = '✓ 준비됨';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
startFile.addEventListener('change', e => { if (e.target.files[0]) loadImageFile(e.target.files[0]); });
monsterFile.addEventListener('change', e => { if (e.target.files[0]) loadImageFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev => startDrop.addEventListener(ev, e => { e.preventDefault(); startDrop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => startDrop.addEventListener(ev, e => { e.preventDefault(); startDrop.classList.remove('drag'); }));
startDrop.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]); });
window.addEventListener('paste', e => {
  if (!e.clipboardData || Game.state === 'playing') return;
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) { loadImageFile(item.getAsFile()); break; }
  }
});

// -------------------------------------------------------------
// Game — state machine + loop + 랭킹 연동
// -------------------------------------------------------------
const Game = {
  state: 'start',
  lastT: 0,

  showOverlay(title, sub, body, btnText) {
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    overlayBody.innerHTML = body;
    actionBtn.textContent = btnText;
    overlayEl.classList.remove('hidden');
    hudEl.style.display = 'none';
    uploadPanel.style.display = 'none';
  },

  hideOverlay() {
    overlayEl.classList.add('hidden');
    hudEl.style.display = '';
    uploadPanel.style.display = '';
  },

  beginPlay() {
    Audio.startMusic();
    Player.reset();
    runScore = 0;
    updateScoreHUD();
    Stage.start(1);
    this.state = 'playing';
    this.hideOverlay();
    overlayControls.style.display = 'none';
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
  },

  gameOver() {
    const finalScore = Math.max(0, runScore);
    this.state = 'gameover';
    this.showOverlay(
      'GAME OVER',
      '패 배',
      `Stage ${Stage.current} · ${Stage.kills} kills<br>Score ${finalScore}`,
      '다 시 시 작'
    );
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
    overlayControls.style.display = 'none';
    actionBtn.disabled = false;
    submitScoreToServer(finalScore);
  },

  stageClear() {
    this.state = 'stageclear';
    runScore += Stage.current * 200; // 스테이지 클리어 보너스
    updateScoreHUD();
    this.showOverlay(
      `STAGE ${Stage.current} CLEAR`,
      '통 과',
      `HP가 회복됩니다. 다음 스테이지는 더 강한 몬스터가 나옵니다.<br>Score ${runScore}`,
      '다 음 스 테 이 지'
    );
    Player.hp = Player.maxHp;
    startDrop.style.display = 'none';
    previewWrap.style.display = 'none';
    overlayControls.style.display = 'none';
    actionBtn.disabled = false;
  },

  onActionButton() {
    if (this.state === 'start') {
      if (!ensurePlayerName()) {
        alert('닉네임을 먼저 입력해 주세요.');
        if (nameInputEl) nameInputEl.focus();
        return;
      }
      this.beginPlay();
    } else if (this.state === 'gameover') {
      Stage.current = 1;
      Player.reset();
      this.beginPlay();
    } else if (this.state === 'stageclear') {
      Stage.start(Stage.current + 1);
      Player.reset();
      this.state = 'playing';
      this.hideOverlay();
    }
  },

  frame(t) {
    const dt = Math.min(0.033, (t - this.lastT) / 1000 || 0.016);
    this.lastT = t;

    if (this.state === 'playing') {
      Input.update(dt);
      Player.update(dt);
      Enemy.update(dt);
      Effects.update(dt);
      Camera.update();
      updateHUD();
      updateTint();
    }

    Renderer.draw();
    requestAnimationFrame(this.frame.bind(this));
  }
};

actionBtn.addEventListener('click', () => Game.onActionButton());
window.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !actionBtn.disabled && overlayEl.classList.contains('hidden') === false) {
    Game.onActionButton();
  }
});

// 닉네임 복원 + 입력에 따라 시작 버튼 활성화
if (loadPlayerNameFromStorage()) {
  actionBtn.disabled = false;
} else {
  actionBtn.disabled = true;
}
if (nameInputEl) {
  nameInputEl.addEventListener('input', () => {
    const hasName = !!nameInputEl.value.trim();
    actionBtn.disabled = !hasName;
  });
}

// 루프 시작
requestAnimationFrame(Game.frame.bind(Game));
</script>

</html>
